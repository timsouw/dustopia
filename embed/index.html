<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#14141a; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif; color:#e7e7ea; }
  /* touch-action:none keeps single-finger drag on the sphere from
     scrolling the page on mobile. Two-finger pinch is handled
     explicitly by our own touch handlers; the browser's default
     pan/zoom is not what we want here. */
  #stage { position:fixed; inset:0; display:block; background:#14141a; touch-action:none; }

  #fps { position:fixed; bottom:10px; right:14px; font-size:10px; color:#55555e; font-variant-numeric:tabular-nums; }
  #loader { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#14141a; z-index:100; font-size:12px; color:#8a8a95; }
  #err { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#12141a; border:1px solid #2a2d36; color:#e7e7ea; padding:20px 24px; border-radius:10px; max-width:560px; display:none; font-size:12px; line-height:1.5; z-index:200; }
  #err code { background:#1c1f28; padding:2px 5px; border-radius:3px; font-family:"SF Mono",monospace; font-size:11px; color:#cfd1d7; }
  #hint { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); font-size:10px; color:#45454d; letter-spacing:.04em; pointer-events:none; user-select:none; }

  /* --- light theme override (body.light) --- */
  body.light, body.light #stage { background:#f4f4f5; }
  body.light { color:#18181b; }
  body.light #fps          { color:#a1a1aa; }
  body.light #loader       { background:#f4f4f5; color:#71717a; }
  body.light #hint         { color:#c4c4c8; }
  body.light #err          { background:#fafafa; border-color:#e4e4e7; color:#18181b; }
  body.light #err code     { background:#e4e4e7; color:#27272a; }

  /* --- live load panel --- */
  #loadPanel {
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    width:min(380px, calc(100vw - 24px));
    background:rgba(16,18,24,0.78); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(255,255,255,0.08); border-radius:12px;
    padding:14px; font-size:12px; line-height:1.4;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    z-index: 50;
  }
  #loadPanel h1 { font-size:13px; font-weight:500; letter-spacing:0; color:#e7e7ea; margin:0; }
  #loadPanel .head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:8px; }
  #loadPanel .head-actions { display:flex; gap:6px; align-items:center; }
  #themeBtn, #copyBtn {
    background:transparent; border:1px solid rgba(255,255,255,.18); color:#9a9aa5;
    font-family:inherit; font-size:10px; letter-spacing:.06em; text-transform:uppercase;
    padding:3px 8px; border-radius:4px; cursor:pointer;
  }
  #themeBtn:hover, #copyBtn:hover { color:#e7e7ea; border-color:#e7e7ea; }
  body.light #themeBtn, body.light #copyBtn { border-color:rgba(0,0,0,.18); color:#71717a; }
  body.light #themeBtn:hover, body.light #copyBtn:hover { color:#18181b; border-color:#18181b; }
  #loadPanel .row { display:flex; gap:6px; margin-bottom:8px; }
  #loadPanel input {
    flex:1; padding:8px 10px; border-radius:6px; border:1px solid rgba(255,255,255,.12);
    background:rgba(0,0,0,.35); color:#e7e7ea; font-family:inherit; font-size:12px; outline:none;
  }
  #loadPanel input:focus { border-color:#e7e7ea; }
  #loadPanel #load {
    padding:8px 14px; border-radius:6px; border:0; background:#e7e7ea; color:#101217;
    font-family:inherit; font-weight:600; font-size:12px; cursor:pointer;
  }
  #loadPanel #load:disabled { opacity:.4; cursor:not-allowed; }
  #status { font-size:11px; color:#8a8a95; min-height:14px; white-space:pre-wrap; margin-top:6px; }
  #status .ok   { color:#9fe8c0; }
  #status .err  { color:#ff7e7e; }
  #status .warn { color:#fbbf24; }
  #examples { margin-top:6px; font-size:10.5px; color:#8a8a95; }
  #examples a { color:#cfd1d7; cursor:pointer; text-decoration:underline; text-decoration-color:rgba(255,255,255,.18); margin-right:8px; }
  #examples a:hover { text-decoration-color:#cfd1d7; }
  #progress {
    height:2px; background:rgba(255,255,255,.08); border-radius:1px;
    overflow:hidden; margin:8px 0; opacity:0;
    transition:opacity 200ms;
  }
  #progress.active { opacity:1; }
  #progress > div {
    height:100%; background:#e7e7ea;
    width:0%; transition:width 100ms linear;
  }

  /* Collapsed state (after successful load) */
  #loadPanel.collapsed {
    width:auto; padding:8px 12px; cursor:pointer;
  }
  #loadPanel.collapsed > *:not(.head) { display:none; }
  #loadPanel.collapsed .head { margin:0; }
  #loadPanel.collapsed h1 { font-size:11px; text-transform:none; letter-spacing:.02em; color:#e7e7ea; cursor:pointer; }
  body.light #loadPanel.collapsed h1 { color:#18181b; }

  body.light #loadPanel { background:rgba(250,250,252,.86); border-color:rgba(0,0,0,.08); }
  body.light #loadPanel h1 { color:#71717a; }
  body.light #loadPanel input { background:#fff; color:#18181b; border-color:rgba(0,0,0,.12); }
  body.light #loadPanel input:focus { border-color:#18181b; }
  body.light #loadPanel #load { background:#18181b; color:#fafafa; }
  body.light #status { color:#71717a; }
  body.light #status .ok    { color:#047857; }
  body.light #status .err   { color:#b91c1c; }
  body.light #status .warn  { color:#b45309; }
  body.light #examples { color:#a1a1aa; }
  body.light #examples a { color:#27272a; }
  body.light #examples a:hover { text-decoration-color:#18181b; }
  body.light #progress { background:rgba(0,0,0,.08); }
  body.light #progress > div { background:#18181b; }

  /* Embed mode = clean view for NFT animation_url. Strip every chrome
     element so the sphere is the artwork, full-bleed. The sphere itself
     is interactive (drag/pinch) — that's it. */
  body.embed #loadPanel,
  body.embed #fps,
  body.embed #hint,
  body.embed #err { display: none !important; }

  /* Cold-start progress UI for embed mode. The full #loadPanel is hidden
     in OpenSea iframes, but visitors still need feedback during the ~30s
     cold build. Classic Apple-style activity indicator: 12 thin bars
     around a circle with a fading trail. Pure CSS, no canvas, no JS,
     no shaders to fight. Hidden the moment the sphere paints. */
  #embedLoader {
    position:fixed; inset:0;
    display:none; align-items:center; justify-content:center;
    pointer-events:none; user-select:none;
    z-index:60;
    color:#e7e7ea;
  }
  body.light #embedLoader { color:#18181b; }
  body.embed #embedLoader { display:flex; }

  .spinner {
    position:relative;
    width:40px; height:40px;
  }
  .spinner i {
    position:absolute;
    top:4px; left:50%;
    width:3px; height:11px;
    margin-left:-1.5px;
    background:currentColor;
    border-radius:2px;
    transform-origin:50% 16px;
    animation:spinner-fade 1.2s linear infinite;
    opacity:0.15;
  }
  @keyframes spinner-fade {
    0%   { opacity:1;    }
    100% { opacity:0.15; }
  }
  .spinner i:nth-child(1)  { transform:rotate(0deg);   animation-delay:-1.10s; }
  .spinner i:nth-child(2)  { transform:rotate(30deg);  animation-delay:-1.00s; }
  .spinner i:nth-child(3)  { transform:rotate(60deg);  animation-delay:-0.90s; }
  .spinner i:nth-child(4)  { transform:rotate(90deg);  animation-delay:-0.80s; }
  .spinner i:nth-child(5)  { transform:rotate(120deg); animation-delay:-0.70s; }
  .spinner i:nth-child(6)  { transform:rotate(150deg); animation-delay:-0.60s; }
  .spinner i:nth-child(7)  { transform:rotate(180deg); animation-delay:-0.50s; }
  .spinner i:nth-child(8)  { transform:rotate(210deg); animation-delay:-0.40s; }
  .spinner i:nth-child(9)  { transform:rotate(240deg); animation-delay:-0.30s; }
  .spinner i:nth-child(10) { transform:rotate(270deg); animation-delay:-0.20s; }
  .spinner i:nth-child(11) { transform:rotate(300deg); animation-delay:-0.10s; }
  .spinner i:nth-child(12) { transform:rotate(330deg); animation-delay: 0.00s; }
</style>

<script>
  // Sandboxed iframes (e.g. OpenSea's NFT preview) don't grant localStorage,
  // so direct access throws SecurityError before main() ever runs. Wrap reads
  // and writes so the page degrades to in-memory state instead of crashing.
  window.safeStorage = (function() {
    let mem = null;
    try {
      const k = '__t';
      localStorage.setItem(k, k);
      localStorage.removeItem(k);
      return {
        get: (k) => { try { return localStorage.getItem(k); } catch { return mem; } },
        set: (k, v) => { try { localStorage.setItem(k, v); } catch { mem = v; } },
      };
    } catch {
      return { get: () => mem, set: (_k, v) => { mem = v; } };
    }
  })();

  // Embed mode = clean view for NFT animation_url. Set the body class
  // BEFORE first paint so CSS hides the UI without flicker.
  (function() {
    const isEmbed = /[?&]embed=1\b/.test(location.search) || /^\/embed(\/|$)/.test(location.pathname);
    if (isEmbed) document.body.classList.add('embed');
    // If we got the address via /embed/<addr> path, copy it into the hash so
    // the existing hash-based auto-loader picks it up.
    const m = location.pathname.match(/^\/embed\/(0x[0-9a-fA-F]{40}|[^/?#]+\.eth)\/?$/i);
    if (m && !location.hash) {
      // Replace state instead of pushing so the back button doesn't cycle.
      history.replaceState(null, '', '#' + m[1]);
    }
    // The metadata animation_url for a minted NFT carries ?token=<id>; we
    // stash it on window so buildLiveData can fetch the per-token config and
    // filter the wallet down to the owner's chosen subset before rendering.
    const params = new URLSearchParams(location.search);
    const tk = params.get('token');
    if (tk && /^\d+$/.test(tk) && tk.length <= 78) {
      window.__dustopiaTokenId = tk;
    }
    // Live preview mode (used by /configure editor): the parent iframe
    // injects ?preview=1&sel=<base64-json-selection> so we render with that
    // override instead of fetching the saved config. Atlas upload is also
    // skipped — we don't want preview drafts polluting R2 caches.
    if (params.get('preview') === '1') window.__dustopiaPreview = true;
    // Explorer mode: /pfp frames the embed with ?nocache=1 so random
    // wallets people paste in don't pollute the R2 atlas / preview-cap
    // caches. Atlas upload + preview capture both gated on this below.
    if (params.get('nocache') === '1') window.__dustopiaNocache = true;
    // Explicit "refresh sphere" flow from /configure. Bypasses every
    // read-side cache (R2 atlas, KV wallet pages) so the rebuild reflects
    // the current state of the holder's wallet, then force-uploads atlas
    // + preview-cap to overwrite the old R2 entries. The opposite of
    // nocache: we WANT to write, we just don't want to read stale.
    if (params.get('fresh') === '1') window.__dustopiaFresh = true;
    // Landing-hero mode: dustopia.xyz frames the deploy wallet's sphere as
    // the live hero. We disable preview-cap upload (the landing
    // shouldn't keep re-capturing what a real /embed visit will), but
    // atlas upload stays on so subsequent hero loads hit the R2 cache.
    if (params.get('landing') === '1') window.__dustopiaLanding = true;
    // PFP-generator mode: forces pure-white background, clamps theme to
    // light, and exposes a postMessage handler that captures the live
    // stage at 4096×4096 PNG for use as a Twitter/Telegram avatar.
    if (params.get('pfp') === '1') window.__dustopiaPfp = true;
    const selRaw = params.get('sel');
    if (selRaw) {
      try {
        const dec = JSON.parse(atob(decodeURIComponent(selRaw)));
        if (dec && (dec.mode === 'all' || dec.mode === 'subset')) {
          window.__dustopiaLiveSelection = dec;
        }
      } catch { /* malformed → ignore, fall back to saved config */ }
    }
  })();

  // Apply persisted theme BEFORE first paint to avoid a flash.
  // Default = light. The toggle button is wired up at script init below.
  (function() {
    const saved = safeStorage.get('franken-theme');
    if (saved === 'dark') document.body.classList.remove('light');
    else                  document.body.classList.add('light');
  })();
</script>

<script>
// ====================================================================
// FRANKENSTEIN — WebGL2 POINTS renderer
// N tokens × GRID² cells = up to 1024 × 2304 particles per frame
// Physics on CPU; ribbon geometry + atlas sampling in vertex shader.
// ====================================================================

// Mobile detection — phones can't push 1024×192² = 37M particles per frame.
// On a coarse-pointer device we halve GRID, LIVE_TILE, and HISTORY_LEN, and
// cap DPR more aggressively. Desktop is untouched.
const IS_MOBILE = (typeof matchMedia !== 'undefined' && matchMedia('(pointer: coarse)').matches)
                  || /iPhone|iPad|iPod|Android/i.test(navigator.userAgent || '');

// Landing-hero mode runs in a small (~600 px) decorative iframe; we
// don't need full-quality density there. Everything sized off these
// constants (atlas texture, history texture, vertex buffers) drops
// ~32× in memory at the values below — measured ~600 MB → tens of MB.
const LANDING_MODE = (typeof window !== 'undefined') && window.__dustopiaLanding === true;

// Test overrides — `?grid=N` and `?ps=N` let the dust-test page A/B
// particle density and per-particle visual size without redeploying
// the embed. Both are capped to a safe allowlist so a malicious caller
// can't allocate gigabytes of GPU memory or shrink the render to
// invisibility.
const _GRID_OVERRIDE = (typeof window !== 'undefined' && (() => {
  try {
    const v = parseInt(new URLSearchParams(location.search).get('grid'), 10);
    return [64, 96, 128, 144, 160, 192].includes(v) ? v : null;
  } catch { return null; }
})()) || null;

// Per-particle size multiplier. 1.0 = production default; lower
// values shrink the sprite WITHOUT changing the swarm spacing, so
// the texture starts to show gaps. Range clamped to 0.05..3.0:
// below 0.05 the sphere is invisible, above 3.0 the GL_POINT_SIZE
// limit kicks in on most drivers anyway.
const _SIZE_MUL_OVERRIDE = (typeof window !== 'undefined' && (() => {
  try {
    const v = parseFloat(new URLSearchParams(location.search).get('ps'));
    if (!Number.isFinite(v)) return null;
    return Math.max(0.05, Math.min(3.0, v));
  } catch { return null; }
})()) || 2.0;
// Default sprite size multiplier 2.0. The shader's base ×1.86
// packing constant assumes denser GRID; at the current 192² with
// slow orbits the eye still picks up gaps between visible rows
// even at 1.5×. 2.0 closes them without smearing thumbnails.
// Override via ?ps=N for the /test bench.

const GRID             = _GRID_OVERRIDE || (LANDING_MODE ? 128 : (IS_MOBILE ? 128 : 192));  // 192² = 36864 particles per image; mobile 128² = 16384; landing 128² (was 96²) for crisper hero
// HISTORY_LEN was sized for SHEAR_FACTOR=0.55 (needed GRID + GRID·0.55
// rows). Since SHEAR is now 0, we only need GRID rows + small slack
// for camera reveals. Halving this halves the GPU memory of the two
// pos/fwd RGBA32F textures, which previously dominated tab usage.
const HISTORY_LEN      = LANDING_MODE ? 144 : (IS_MOBILE ? 144 : 208); // ≥ GRID + small slack
const LANE_WIDTH       = 0.32 / GRID;           // image arc coverage = GRID·LANE_WIDTH = 0.32 rad (kept identical across GRID changes)
const ADVECT_SPEED     = 0.013;                 // longer streaks — decoupled from LANE_WIDTH for wind feel
// Calm-portrait default. Earlier passes had a heavy windswept look
// (SHEAR 0.55, WIND 0.014/0.004) that smeared individual NFT thumbnails
// into a uniform blur. Adopting the PFP values globally: zero shear,
// zero wind, tiny residual wave so the surface still breathes. Result
// is a ribboned sphere where each holding is a recognisable colour
// band. PFP / MP4 captures still set _PFP — the flag now only gates
// theme/upload/DPR overrides, not the physics constants.
const _PFP = (typeof window !== 'undefined') && window.__dustopiaPfp === true;
const SHEAR_FACTOR     = 0;
const WAVE_AMPLITUDE   = 0.005;
const WIND_AMP_LOW     = 0;
const WIND_AMP_HIGH    = 0;

// --- school-of-fish flocking ---
const FLOCK_ALIGN      = 0.55;    // weight: pull forward toward collection's average heading
const FLOCK_COHESION   = 0.35;    // weight: pull position toward collection centroid (past a soft radius)

// --- pole-avoidance: prevent clusters from getting stuck spinning in tight
// circles at the ±Y poles (sphere singularity). When a token's |y| exceeds
// the threshold, push it back toward the equator. Strength ramps linearly
// from 0 at the threshold to MAX at the pole.
const POLE_THRESHOLD   = 0.65;    // ~50° from equator — beyond this, push starts
const POLE_PUSH_MAX    = 0.55;    // max equator-bias added to vbuf at the pole
const FLOCK_REST_ARC   = 0.18;    // no cohesion pull within this arc distance (≈10°)

// --- inter-collection separation (Reynolds rule #3): push collections away
// from each other so they spread evenly across the sphere instead of clumping
// in one hemisphere. Operates on collection centroids each frame.
const SEPARATION_RADIUS   = 1.1;   // ≈63° of arc — only push when truly nearby
const SEPARATION_STRENGTH = 0.20;  // gentler — was 0.45, caused "rocket-stripe" look on close encounters

// --- collection-wide big waves ---
const BIG_WAVE_MIN     = 5;                  // collections with ≥ this many tokens get synced waves
const BIG_WAVE_AMP     = WAVE_AMPLITUDE * 2.6; // ~2.6× per-token amplitude
const BIG_WAVE_FREQ    = 0.6;                // slower than per-token wave
const ATLAS_TILES_ROW  = 32;
const SPHERE_FACTOR    = 0.032;  // halved from 0.064 — denser packing
const SPHERE_SCALE_A   = 0.42;
const SPHERE_SCALE_B   = 0.09;   // tamer than 0.17 — with N=500 the growth is already huge
// Hard floor + cap (% of min(W,H)) so low-N wallets still look filled and high-N
// wallets can't escape the viewport. Floor is what fixes the "1 token = invisible" case.
const SPHERE_FRAC_MIN  = 0.17;   // ≈ 17% of shorter viewport edge — leaves a breathing margin so wave-amp particles don't kiss the canvas edge while rotating
const SPHERE_FRAC_MAX  = 0.20;   // matched to the new MIN ratio (was 0.23) so silhouette safety still scales with default size

// --- collection layering: each collection lives on one of LAYER_COUNT concentric shells ---
// The base unit sphere is r=1.0. Inner shells (<1.0) sit closer to center, outer (>1.0)
// further out. Adds depth: as the orb rotates, near layers occlude far layers.
const LAYER_COUNT      = 4;
const LAYER_INNER_R    = 0.78;   // inner-most shell
const LAYER_OUTER_R    = 1.18;   // outer-most shell

// CONTRACT: showError + setStatus interpolate via innerHTML. Callers MUST
// either pass a static-string HTML literal or run user/external data through
// esc() first. Search the file for "showError(" and "setStatus(" before
// adding new sites — every audit so far has confirmed all dynamic values
// are escaped, but this is defense-in-depth.
function showError(html) {
  const e = document.getElementById('err');
  e.style.display = 'block';
  e.innerHTML = html;
  document.getElementById('loader').style.display = 'none';
}
// Plain-text alternative when the message originates from user / network /
// other untrusted source and you don't want to think about escaping.
function showErrorText(text) { showError(esc(text)); }

// Debug-only logging: noisy expected-fallback paths (older Safari without
// OffscreenCanvas, slow image CDN, non-fatal upload retries) shouldn't
// pollute production consoles. Errors that indicate real bugs still go
// through console.error directly. Gate on the same ?debug=1 query as the
// FPS overlay so dev sessions opt-in once.
const _DEBUG_LOG = /[?&]debug=1/.test(location.search);
function dbg(...args)  { if (_DEBUG_LOG) console.log(...args); }
function dwarn(...args){ if (_DEBUG_LOG) console.warn(...args); }

// Deterministic PRNG (mulberry32). Seeded from the wallet address so
// every run of this wallet produces the identical animation — important
// for the NFT-deployment path where the on-chain output must be reproducible.
function mulberry32(seed) {
  let s = seed >>> 0;
  return function() {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function seedFromString(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}

// =============================================================
// DEBUG flag: ?debug=1 in URL exposes the FPS counter.
// =============================================================
const DEBUG = /[?&]debug=1/.test(location.search);
if (!DEBUG) { const f = document.getElementById('fps'); if (f) f.style.display = 'none'; }

// =============================================================
// LIVE DATA PIPELINE (Alchemy → in-memory meta + binBuf)
// Replaces the original `fetch('tokens.bin')` path. Output shape matches
// what main() expects: meta { count, lods, offsets, tokens } + binBuf with
// N×tileSize×tileSize×3 bytes of RGB8 starting at offset 0.
// =============================================================
// API_URL points to our Cloudflare Worker proxy. The Worker hides the Alchemy
// key, caches responses in KV, and adds retries.
//
// While developing: set to '' (empty string) to fall back to direct Alchemy
// calls — useful for local testing before the Worker is deployed.
const API_URL      = 'https://api.dustopia.xyz';
const ALCH_PAGE    = 100;
// Renderer caps at MAX_TOKENS=512 — at the previous 1024 the per-frame
// particle count was 37 M (1024 × 192²) and FPS dropped on average GPUs.
// 512 halves it to 18 M without losing visual density. With the cap at
// 512 we only need ~6-7 pages worth of NFTs even after spam-filter
// drops, so trimmed ALCH_MAX_PAG to 8. Keeps the metadata phase to
// ~6-8 s and stays well clear of the worker's per-IP rate limit even
// for a whale.
const ALCH_MAX_PAG = 8;
const LIVE_TILE    = GRID;           // matches GRID — desktop 192×192, mobile 128×128 (atlas size scales with GRID²)
const FETCH_CONC   = 12;
const FETCH_TIMEOUT= 12000;
const MAX_TOKENS   = LANDING_MODE ? 256 : 512;   // safety ceiling for live render perf; landing trims for hero memory

const statusEl = () => document.getElementById('status');
function setStatus(html) {
  // Only feeds the desktop #loadPanel #status. Embed mode shows a centered
  // "loading…" indicator with pulsing dots (CSS-driven, not progress-bound)
  // so we don't try to mirror per-step text into the iframe.
  const el = statusEl(); if (el) el.innerHTML = html;
}
// HTML-escape for any value derived from user input or external data that we
// interpolate into setStatus / showError. Defense-in-depth: existing regex
// validators already block XSS chars, but escaping survives future refactors.
function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

// Robust fetch: retries on transient failures (429/500/502/503/504) with
// exponential backoff, plus 15s AbortController timeout per attempt. Throws
// only on permanent failure (4xx other than 429) or after retries exhausted.
async function fetchWithRetry(url, opts = {}) {
  const RETRIABLE = new Set([429, 500, 502, 503, 504]);
  // Worker rate-limit is per-minute; the schedule below totals ~91 s
  // of backoff so a single retry storm spans a full bucket boundary
  // even when the entire 60s window is already saturated.
  const DELAYS = [3000, 8000, 20000, 60000];
  const TIMEOUT_MS = 15000;
  let lastErr;
  for (let attempt = 0; attempt <= DELAYS.length; attempt++) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
    try {
      const r = await fetch(url, { ...opts, signal: ctrl.signal });
      clearTimeout(timer);
      if (r.ok) return r;
      // Non-retriable error (4xx other than 429): fail fast
      if (!RETRIABLE.has(r.status)) {
        throw new Error(`HTTP ${r.status}`);
      }
      lastErr = new Error(`HTTP ${r.status}`);
    } catch (e) {
      clearTimeout(timer);
      lastErr = e.name === 'AbortError' ? new Error('timeout') : e;
    }
    if (attempt < DELAYS.length) {
      await new Promise(res => setTimeout(res, DELAYS[attempt]));
    }
  }
  throw lastErr;
}

async function resolveENSLive(name) {
  const url = API_URL
    ? `${API_URL}/api/ens/${encodeURIComponent(name)}`
    : `https://api.ensideas.com/ens/resolve/${encodeURIComponent(name)}`;
  const r = await fetchWithRetry(url);
  const j = await r.json();
  if (!j.address) throw new Error(`ENS not found for ${name}`);
  return j.address;
}

async function fetchAllNFTsLive(owner, onProgress) {
  let all = [], pageKey = null;
  for (let p = 0; p < ALCH_MAX_PAG; p++) {
    let u;
    if (API_URL) {
      // Through our Worker proxy: /api/wallet/<address>?pageKey=...
      // ?spam=include surfaces everything Alchemy knows about. The
      // false-positive rate of their classifier is high enough that
      // legitimate collections (CryptoPunks v1, older blue chips) get
      // dropped — better to receive the full set and let the per-mode
      // filter below decide. In 'all' mode we still drop isSpam=true,
      // but in 'subset' mode the holder's explicit selection wins.
      u = new URL(`${API_URL}/api/wallet/${owner}`);
      u.searchParams.set('spam', 'include');
      if (pageKey) u.searchParams.set('pageKey', pageKey);
      // bust=1 tells the Worker to bypass the wallet KV cache on both
      // read and write — used by /configure's "Refresh sphere" so a
      // newly-bought NFT shows up immediately instead of waiting
      // WALLET_TTL.
      if (window.__dustopiaFresh) u.searchParams.set('bust', '1');
    } else {
      // Fallback: direct Alchemy call (local dev only — exposes API key).
      u = new URL('https://eth-mainnet.g.alchemy.com/nft/v3/YOUR_KEY/getNFTsForOwner');
      u.searchParams.set('owner', owner);
      u.searchParams.set('pageSize', ALCH_PAGE);
      u.searchParams.set('withMetadata', 'true');
      u.searchParams.set('excludeFilters[]', 'SPAM');
      if (pageKey) u.searchParams.set('pageKey', pageKey);
    }
    const r = await fetchWithRetry(u);
    const j = await r.json();
    all = all.concat(j.ownedNfts || []);
    if (onProgress) onProgress(all.length, j.totalCount);
    if (!j.pageKey) break;
    pageKey = j.pageKey;
  }
  return all;
}

// Returns ordered list of fallback URLs for one NFT. Tried in order — first
// one that successfully loads + decodes wins. thumbnailUrl is Alchemy's
// CDN-cached small render with reliable CORS; the others are larger but
// less reliable (older collections often have dead pngUrl/cachedUrl).
function pickImageUrls(nft) {
  const img = nft.image || {};
  const urls = [];
  if (img.thumbnailUrl) urls.push(img.thumbnailUrl);
  if (img.cachedUrl)    urls.push(img.cachedUrl);
  if (img.pngUrl)       urls.push(img.pngUrl);
  return urls;
}
// Backward-compat shim — first URL only.
function pickThumbUrlLive(nft) {
  const urls = pickImageUrls(nft);
  return urls.length ? urls[0] : null;
}

function loadImageWithTimeoutLive(url, ms) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    let settled = false;
    const finish = v => { if (!settled) { settled = true; resolve(v); } };
    const timer = setTimeout(() => {
      // On timeout, swap src to a tiny inline data: URL so the browser stops
      // downloading the original. (You can't directly abort an HTMLImageElement
      // request, but unsetting/replacing src interrupts the in-flight fetch
      // in modern browsers.) Saves bandwidth on slow CDN URLs.
      img.onload = img.onerror = null;
      img.src = 'data:image/gif;base64,R0lGODlhAQABAAAAACw=';
      finish(null);
    }, ms);
    img.onload  = () => { clearTimeout(timer); finish(img.naturalWidth > 0 ? img : null); };
    img.onerror = () => { clearTimeout(timer); finish(null); };
    img.src = url;
  });
}

// Try each URL in `urlList` in order; first one that loads successfully wins.
// Lets us recover from CORS-broken pngUrls by falling through to thumbnailUrl.
async function loadImageWithFallback(urlList, ms) {
  for (const url of urlList) {
    if (!url) continue;
    const img = await loadImageWithTimeoutLive(url, ms);
    if (img) return img;
  }
  return null;
}

async function fetchImagesParallelLive(urlLists, concurrency, onProgress) {
  const results = new Array(urlLists.length);
  let done = 0, next = 0;
  async function worker() {
    while (true) {
      const i = next++;
      if (i >= urlLists.length) return;
      results[i] = await loadImageWithFallback(urlLists[i], FETCH_TIMEOUT);
      done++;
      if (onProgress) onProgress(done, urlLists.length);
    }
  }
  await Promise.all(Array.from({ length: concurrency }, worker));
  return results;
}

// Build a meta object from {nft} pairs. Cheap; no canvas work.
//
// `contract` is the normalised lowercase address — needed by the
// selection-mask path so we can match per-slot tokens against
// selection.collections / selection.tokens entries (both of which are
// keyed by contract address). `collection` stays the human-readable
// display name for any future UI that wants it.
function buildAtlasMeta(pairs) {
  const tileSize = LIVE_TILE;
  const tokens = pairs.map(p => ({
    collection: (p.nft.contract && p.nft.contract.name) || (p.nft.contract && p.nft.contract.address) || 'unknown',
    contract:   (p.nft.contract && p.nft.contract.address)
                  ? p.nft.contract.address.toLowerCase() : '',
    tokenId:    p.nft.tokenId != null ? String(p.nft.tokenId) : '',
  }));
  return {
    count:   pairs.length,
    lods:    [tileSize],
    offsets: { ['lod' + tileSize]: 0 },
    tokens,
  };
}

// Quality knob for the WebP-encoded atlas. q=0.90 gives ~10× smaller
// payload than raw RGB (44 MB → ~4-5 MB for a 500-token wallet) with no
// perceptible quality loss in the final particle render — particles
// sample atlas at ~2-3 pixels with motion blur, so high-frequency
// compression artifacts simply don't make it to the eye.
const ATLAS_WEBP_QUALITY = 0.90;

// =====================================================================
// PROGRESSIVE ATLAS — instead of awaiting every NFT thumbnail before
// the first paint, allocate a grey-filled skeleton atlas immediately so
// the GL setup + render loop can start within a few seconds. As each
// image lands we draw it onto the skeleton canvas and emit a
// per-tile RGB byte buffer so the caller can `gl.texSubImage2D` only
// that region of the GPU texture. Sphere visibly fills with real
// thumbnails as they arrive.
// =====================================================================

function allocSkeletonAtlas(N) {
  const tileSize  = LIVE_TILE;
  const TPR       = ATLAS_TILES_ROW;
  const atlasRows = Math.max(1, Math.ceil(N / TPR));
  const atlasW    = TPR * tileSize;
  const atlasH    = atlasRows * tileSize;

  // RGB byte buffer for the initial GL upload. Black is fine — the
  // loadedMask 1D texture (set up in main()) culls every particle for
  // unloaded tokens, so these pixels are never sampled until grow()
  // overwrites them with the real thumbnail.
  const atlasData = new Uint8Array(atlasW * atlasH * 3);

  // Persistent canvas. Each landed thumbnail is drawn at its slot via
  // ctx.drawImage; we both extract a tile-region RGB buffer for live GL
  // updates AND keep the canvas around so finalize() can encode the
  // whole thing as WebP for R2 upload at the end.
  const canvas = document.createElement('canvas');
  canvas.width  = atlasW;
  canvas.height = atlasH;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  // Background fill: pure black, so the WebP we eventually upload to R2
  // has neutral letterbox for any slot whose fetch failed (matches the
  // legacy build path).
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, atlasW, atlasH);

  return { atlasData, atlasW, atlasH, canvas, ctx };
}

// Drain `used` (NFT candidates with image URL lists) in parallel
// workers. Each landed image is drawn into `skeleton.canvas` at its
// slot and its 192×192 region is converted to RGB bytes for the
// caller (typically gl.texSubImage2D for live texture replacement).
// Resolves with the WebP-encoded full atlas blob for R2 upload.
async function growAtlasFrom(used, skeleton, opts) {
  const { onSlotReady, onProgress } = opts || {};
  const tileSize = LIVE_TILE;
  const TPR      = ATLAS_TILES_ROW;
  const ctx      = skeleton.ctx;
  const N        = used.length;
  const concurrency = Math.max(1, FETCH_CONC);

  // Reusable RGB scratch buffer — sized for one tile; one per worker so
  // workers don't trample each other while the slot's draw + extract
  // runs.
  const scratchPool = Array.from({ length: concurrency },
    () => new Uint8Array(tileSize * tileSize * 3));

  let next = 0, done = 0, failed = 0;

  async function worker(idx) {
    const scratch = scratchPool[idx];
    while (true) {
      const i = next++;
      if (i >= N) return;
      const image = await loadImageWithFallback(used[i].urls, FETCH_TIMEOUT);
      if (image) {
        const tx = (i % TPR) * tileSize;
        const ty = ((i / TPR) | 0) * tileSize;
        try {
          ctx.drawImage(image, tx, ty, tileSize, tileSize);
          const rgba = ctx.getImageData(tx, ty, tileSize, tileSize).data;
          // RGBA → RGB packed in-place into the scratch buffer. The
          // shader samples atlas as RGB8 so alpha is dropped.
          for (let p = 0, q = 0; p < rgba.length; p += 4, q += 3) {
            scratch[q]   = rgba[p];
            scratch[q+1] = rgba[p+1];
            scratch[q+2] = rgba[p+2];
          }
          if (onSlotReady) onSlotReady(i, tx, ty, tileSize, scratch);
        } catch (e) {
          dwarn('[progressive] tile draw failed', i, e);
          failed++;
        }
      } else {
        failed++;
      }
      done++;
      if (onProgress) onProgress(done, N, failed);
    }
  }

  await Promise.all(Array.from({ length: concurrency }, (_, idx) => worker(idx)));

  // Encode the whole canvas as WebP for the R2 upload path. This is
  // expensive (~1-3 s for a 6000² atlas) but it's now off the
  // first-paint critical path entirely — it runs after the sphere is
  // already showing real thumbnails.
  const atlasBlob = await new Promise((res) => skeleton.canvas.toBlob(res, 'image/webp', ATLAS_WEBP_QUALITY));
  return { atlasBlob, failed };
}

// Decode a stored atlas image (WebP/PNG) into the 2D RGB pixel data the
// renderer hands to texImage2D. Symmetric inverse of the build path.
async function decodeAtlasImage(blob) {
  const url = URL.createObjectURL(blob);
  try {
    const img = new Image();
    img.src = url;
    await img.decode();
    const atlasW = img.naturalWidth, atlasH = img.naturalHeight;
    const c = document.createElement('canvas');
    c.width = atlasW; c.height = atlasH;
    const ctx = c.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(img, 0, 0);
    const rgba = ctx.getImageData(0, 0, atlasW, atlasH).data;
    const atlasData = new Uint8Array(atlasW * atlasH * 3);
    for (let p = 0, q = 0; p < rgba.length; p += 4, q += 3) {
      atlasData[q]   = rgba[p];
      atlasData[q+1] = rgba[p+1];
      atlasData[q+2] = rgba[p+2];
    }
    return { atlasData, atlasW, atlasH };
  } finally {
    URL.revokeObjectURL(url);
  }
}

function setProgress(pct, active) {
  // Desktop #loadPanel only — the embed loader is CSS-only pulsing dots.
  const wrap = document.getElementById('progress');
  if (!wrap) return;
  const bar = wrap.firstElementChild;
  if (active) wrap.classList.add('active'); else wrap.classList.remove('active');
  if (bar) bar.style.width = (pct * 100).toFixed(1) + '%';
}

// =====================================================================
// R2 ATLAS CACHE (server-side) — try to skip the entire image-fetch +
// canvas-build pipeline by downloading a pre-built atlas binary from our
// Worker. Cache key is (addr, GRID); content is deterministic until the
// holdings change (manual DELETE today, Alchemy webhook eventually).
// =====================================================================

// Per-token configuration: lets the holder pick a subset of their wallet
// to render. Returns the parsed config or null on any failure (Worker
// returns a default { mode:"all" } even when nothing's saved, so a real
// null from this helper means the network call itself failed).
async function tryFetchConfig(tokenId) {
  if (!API_URL || !tokenId) return null;
  try {
    const r = await fetch(`${API_URL}/api/config/${tokenId}`);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

// Compact deterministic fingerprint of a selection blob. Two configs with
// the same set of collections + tokens (regardless of order) produce the
// same fp, which lets the R2 atlas cache amortize identical selections
// across tokens. mode='all' always collapses to 'all'.
async function selectionFingerprint(selection) {
  if (!selection || selection.mode === 'all') return 'all';
  const cols = (selection.collections || []).map(s => String(s).toLowerCase()).sort();
  const tks  = (selection.tokens || []).map(t => `${String(t.contract).toLowerCase()}:${t.tokenId}`).sort();
  const canon = cols.join(',') + '|' + tks.join(',');
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(canon));
  // First 8 bytes = 16 hex chars. Plenty unique for our use; collisions
  // would only mean cache sharing across genuinely-different selections.
  return Array.from(new Uint8Array(buf, 0, 8)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Filter a list of NFT objects by a selection. Returns the same shape;
// preserves order. mode='all' is a no-op pass-through. mode='subset' keeps
// only NFTs whose contract is in selection.collections OR whose
// (contract, tokenId) pair is in selection.tokens.
function filterNftsBySelection(nfts, selection) {
  if (!selection || selection.mode === 'all') return nfts;
  const cols = new Set((selection.collections || []).map(s => String(s).toLowerCase()));
  const tks  = new Set((selection.tokens || []).map(t => `${String(t.contract).toLowerCase()}:${t.tokenId}`));
  if (!cols.size && !tks.size) return [];
  const out = [];
  for (const n of nfts) {
    const c  = (n.contract && n.contract.address) ? n.contract.address.toLowerCase() : '';
    const id = n.tokenId != null ? String(n.tokenId) : '';
    if (cols.has(c) || tks.has(`${c}:${id}`)) out.push(n);
  }
  return out;
}

// Returns { meta, atlasData, atlasW, atlasH } on cache hit, null on miss
// or any error. Two storage formats are supported transparently:
//
//   • image/webp (current) — single 2D atlas grid encoded at q=0.9. Decoded
//     here via Image + canvas.getImageData. Roughly 10× smaller than raw
//     RGB on typical photographic NFT thumbs.
//
//   • application/octet-stream (legacy, raw RGB concatenated 1D) — kept
//     for backwards compat with R2 entries written before the WebP cutover.
//     Repacks 1D bin into a 2D atlas grid in JS.
//
// Both paths return identical-shape objects so main() doesn't have to
// know which format was on disk.
async function tryFetchCachedAtlas(addr, fp) {
  if (!API_URL) return null;
  const fpQ = (fp && fp !== 'all') ? `&fp=${fp}` : '';
  const base = `${API_URL}/api/atlas/${addr}?grid=${GRID}${fpQ}`;
  let metaRes, binRes;
  try {
    metaRes = await fetch(base + '&meta=1');
    if (metaRes.status === 404) return null;
    if (!metaRes.ok) return null;
    binRes = await fetch(base);
    if (!binRes.ok) return null;
  } catch { return null; }
  let meta;
  try { meta = await metaRes.json(); } catch { return null; }

  const ct = (binRes.headers.get('Content-Type') || '').toLowerCase();
  const tileSize = GRID;
  const TPR = ATLAS_TILES_ROW;

  if (ct.startsWith('image/')) {
    // New WebP/PNG path: decode → 2D atlas pixel data.
    let blob;
    try { blob = await binRes.blob(); } catch { return null; }
    let decoded;
    try { decoded = await decodeAtlasImage(blob); } catch (e) { dwarn('atlas decode failed', e); return null; }
    return { meta, atlasData: decoded.atlasData, atlasW: decoded.atlasW, atlasH: decoded.atlasH };
  }

  // Legacy path: raw RGB concatenated 1D, must equal exactly N × tile² × 3 bytes.
  const binBuf = await binRes.arrayBuffer();
  const expected = meta.count * tileSize * tileSize * 3;
  if (binBuf.byteLength !== expected) return null;

  // Repack 1D → 2D for the renderer (it always works in 2D atlas-grid form).
  const atlasRows = Math.ceil(meta.count / TPR);
  const atlasW = TPR * tileSize;
  const atlasH = atlasRows * tileSize;
  const atlasData = new Uint8Array(atlasW * atlasH * 3);
  const lodTiles = new Uint8Array(binBuf);
  const stride = tileSize * 3;
  for (let ti = 0; ti < meta.count; ti++) {
    const tileX = ti % TPR;
    const tileY = (ti / TPR) | 0;
    const srcStart = ti * tileSize * tileSize * 3;
    for (let py = 0; py < tileSize; py++) {
      const srcRow = srcStart + py * stride;
      const dstRow = ((tileY * tileSize + py) * atlasW + tileX * tileSize) * 3;
      atlasData.set(lodTiles.subarray(srcRow, srcRow + stride), dstRow);
    }
  }
  return { meta, atlasData, atlasW, atlasH };
}


// =====================================================================
// PREVIEW CAPTURE — animated WebP loop of the live sphere uploaded to R2.
// Marketplace grids fetch metadata.image, the Worker resolves the token's
// owner and serves this WebP. ~12-15 frames at 800px reads as a smooth
// rotation and weighs ~600 KB-1.5 MB.
//
// Encoding is pure-JS RIFF muxing: we ask the browser to canvas.toBlob()
// each frame as VP8 WebP (native), splice out the VP8 chunks, and wrap
// them in a VP8X+ANIM+ANMF container. No wasm dependency. If the
// browser refuses to encode WebP (very old Safari) we fall back to a
// single-frame PNG so the preview pipeline never breaks.
// =====================================================================

const PREVIEW_SIZE       = 800;            // square, matches metadata SVG viewBox
const PREVIEW_DELAY_MS   = 4500;           // wait for swarm to settle before snapping
const PREVIEW_FRAMES     = 14;             // total frames in the loop
const PREVIEW_FRAME_MS   = 110;            // delay between frames (≈9 fps display)
const PREVIEW_WEBP_Q     = 0.78;           // quality arg to canvas.toBlob('image/webp')

// Returns true ONLY when R2 already holds an animated-WebP capture for this
// addr; legacy PNG entries from the pre-WebP era return false so the first
// /embed visitor naturally upgrades them. Bypassed entirely via `force`.
async function hasCachedPreview(addr) {
  if (!API_URL) return false;
  try {
    const r = await fetch(`${API_URL}/api/preview-cap/${addr}`, { method: 'HEAD' });
    if (!r.ok) return false;
    // Only treat WebP as "cached" — anything else (PNG, GIF) is from an
    // older capture path and should be re-shot in the new animated format.
    const ct = (r.headers.get('Content-Type') || '').toLowerCase();
    if (!ct.startsWith('image/webp')) return false;
    // Reject zero / near-zero objects — past upload paths could leave a
    // 0-byte WebP behind (capture-before-paint, blob.toBlob returning a
    // header-only frame). Without this guard the next visitor sees the
    // HEAD return 200 + image/webp and skips re-uploading, leaving the
    // gallery rendering an "image" that paints as blank. 5 KB is well
    // below any real animated WebP from this codebase (~150-300 KB).
    const len = parseInt(r.headers.get('Content-Length') || '0', 10);
    if (!Number.isFinite(len) || len < 5_000) return false;
    return true;
  } catch { return false; }
}

// Read a 4-char ASCII tag at offset `o` from a DataView.
function _riffTag(dv, o) {
  return String.fromCharCode(dv.getUint8(o), dv.getUint8(o+1), dv.getUint8(o+2), dv.getUint8(o+3));
}

// Extract the VP8/VP8L bitstream chunk from a complete WebP file produced
// by canvas.toBlob('image/webp'). Returns { fourcc, payload } or null.
// Browser-encoded WebPs are RIFF[size]WEBP + a single VP8 (lossy) or VP8L
// (lossless) chunk. We don't support animated input here — the source is
// always a fresh single-frame canvas.
function _extractVp8Chunk(arrayBuf) {
  if (arrayBuf.byteLength < 20) return null;
  const dv = new DataView(arrayBuf);
  if (_riffTag(dv, 0) !== 'RIFF' || _riffTag(dv, 8) !== 'WEBP') return null;
  let off = 12;
  while (off + 8 <= dv.byteLength) {
    const tag = _riffTag(dv, off);
    const size = dv.getUint32(off + 4, true);
    if (tag === 'VP8 ' || tag === 'VP8L') {
      const payload = new Uint8Array(arrayBuf, off + 8, size);
      return { fourcc: tag, payload };
    }
    off += 8 + size + (size & 1);   // chunks are padded to even byte
  }
  return null;
}

// Build an animated-WebP bytestream from a list of single-frame VP8 chunks.
// Spec: https://developers.google.com/speed/webp/docs/riff_container#extended_file_format
function _buildAnimatedWebP(frames, width, height, frameDurationMs) {
  // Each VP8 sub-chunk is "VP8 " + size + payload (+ pad). Each ANMF wraps
  // one such sub-chunk plus a 16-byte frame header.
  const enc = (s) => new Uint8Array([s.charCodeAt(0), s.charCodeAt(1), s.charCodeAt(2), s.charCodeAt(3)]);
  const u32le = (n) => {
    const a = new Uint8Array(4);
    new DataView(a.buffer).setUint32(0, n >>> 0, true);
    return a;
  };
  const u24le = (n) => {
    const a = new Uint8Array(3);
    a[0] = n & 0xff; a[1] = (n >> 8) & 0xff; a[2] = (n >> 16) & 0xff;
    return a;
  };

  // VP8X: feature flags (Animation bit only — we don't use alpha/exif/icc/xmp)
  // followed by 3 reserved bytes, then (W-1) and (H-1) as 24-bit LE.
  const vp8xPayload = new Uint8Array(10);
  vp8xPayload[0] = 0x02;            // animation bit
  vp8xPayload.set(u24le(width  - 1), 4);
  vp8xPayload.set(u24le(height - 1), 7);

  // ANIM: 4-byte background color (BGRA — we use opaque black) + loop count
  // (0 = infinite). The bg color shows in transparent areas; opaque frames
  // ignore it.
  const animPayload = new Uint8Array(6);
  animPayload[0] = 0x14; animPayload[1] = 0x14; animPayload[2] = 0x14;  // dark grey BGR
  animPayload[3] = 0xff;                                                 // alpha
  animPayload[4] = 0;     animPayload[5] = 0;                            // loop forever

  // Helper: build a full RIFF chunk (4cc + size + payload + pad-byte).
  const makeChunk = (fourcc, payload) => {
    const size = payload.length;
    const pad = size & 1;
    const out = new Uint8Array(8 + size + pad);
    out.set(enc(fourcc), 0);
    out.set(u32le(size), 4);
    out.set(payload, 8);
    return out;
  };

  // Helper: build an ANMF chunk wrapping one VP8 sub-chunk.
  const makeAnmf = (vp8Sub) => {
    // 16-byte ANMF header + sub-chunk(s)
    const header = new Uint8Array(16);
    header.set(u24le(0), 0);             // X offset (must be even, 0 fine)
    header.set(u24le(0), 3);             // Y offset
    header.set(u24le(width  - 1), 6);    // frame W-1
    header.set(u24le(height - 1), 9);    // frame H-1
    header.set(u24le(frameDurationMs), 12);  // duration ms
    header[15] = 0x00;                   // flags: no blending, no dispose
    const sub = makeChunk(vp8Sub.fourcc, vp8Sub.payload);
    const body = new Uint8Array(header.length + sub.length);
    body.set(header, 0);
    body.set(sub, header.length);
    return makeChunk('ANMF', body);
  };

  const vp8xChunk = makeChunk('VP8X', vp8xPayload);
  const animChunk = makeChunk('ANIM', animPayload);
  const anmfChunks = frames.map(makeAnmf);

  // Total RIFF body = "WEBP" + VP8X + ANIM + ANMFs
  let bodyLen = 4 + vp8xChunk.length + animChunk.length;
  for (const c of anmfChunks) bodyLen += c.length;

  const out = new Uint8Array(8 + bodyLen);
  out.set(enc('RIFF'), 0);
  out.set(u32le(bodyLen), 4);
  out.set(enc('WEBP'), 8);
  let off = 12;
  out.set(vp8xChunk, off); off += vp8xChunk.length;
  out.set(animChunk, off); off += animChunk.length;
  for (const c of anmfChunks) { out.set(c, off); off += c.length; }
  return out;
}

// Capture N frames from `stage` into a single animated WebP. Frames are
// snapped on rAF ticks so the sphere keeps rotating between them. Returns
// a Blob, or null if WebP encoding isn't available in this browser.
async function captureAnimatedWebP(stage) {
  const off = document.createElement('canvas');
  off.width = off.height = PREVIEW_SIZE;
  const ctx = off.getContext('2d');

  // Snap one frame per `PREVIEW_FRAME_MS`. We rAF-loop instead of setTimeout
  // so the captured rotation is perceptually smooth — each frame lands on a
  // freshly-painted GL frame instead of a random time slice.
  const frames = [];
  const t0 = performance.now();
  for (let i = 0; i < PREVIEW_FRAMES; i++) {
    const target = t0 + i * PREVIEW_FRAME_MS;
    while (performance.now() < target) await new Promise(r => requestAnimationFrame(r));
    ctx.fillStyle = '#14141a';
    ctx.fillRect(0, 0, PREVIEW_SIZE, PREVIEW_SIZE);
    try { ctx.drawImage(stage, 0, 0, PREVIEW_SIZE, PREVIEW_SIZE); }
    catch (e) { dwarn('[preview] drawImage failed', e); return null; }
    const blob = await new Promise(r => off.toBlob(r, 'image/webp', PREVIEW_WEBP_Q));
    if (!blob) { dwarn('[preview] toBlob webp returned null (browser unsupported?)'); return null; }
    const buf = await blob.arrayBuffer();
    const sub = _extractVp8Chunk(buf);
    if (!sub) { dwarn('[preview] could not extract VP8 chunk from frame', i); return null; }
    frames.push(sub);
  }

  const muxed = _buildAnimatedWebP(frames, PREVIEW_SIZE, PREVIEW_SIZE, PREVIEW_FRAME_MS);
  return new Blob([muxed], { type: 'image/webp' });
}

// Single-PNG fallback for browsers where WebP encoding fails outright.
async function captureSinglePng(stage) {
  const off = document.createElement('canvas');
  off.width = off.height = PREVIEW_SIZE;
  const ctx = off.getContext('2d');
  ctx.fillStyle = '#14141a';
  ctx.fillRect(0, 0, PREVIEW_SIZE, PREVIEW_SIZE);
  try { ctx.drawImage(stage, 0, 0, PREVIEW_SIZE, PREVIEW_SIZE); }
  catch (e) { dwarn('[preview] drawImage failed', e); return null; }
  return await new Promise(r => off.toBlob(r, 'image/png'));
}

// Capture + upload the preview snapshot. `force=true` skips the
// hasCachedPreview short-circuit (used after a holder Save, where the
// existing R2 entry is now stale even if it exists).
async function tryCaptureAndUploadPreview(addr, opts = {}) {
  if (!API_URL || !addr) return;
  if (!opts.force && await hasCachedPreview(addr)) return;

  const stage = document.getElementById('stage');
  if (!stage) return;

  // Try animated WebP first; fall back to PNG. Either is accepted by the
  // Worker (httpMetadata.contentType is set from the actual blob type).
  let blob = await captureAnimatedWebP(stage);
  let contentType = 'image/webp';
  if (!blob) {
    blob = await captureSinglePng(stage);
    contentType = 'image/png';
  }
  if (!blob) { dwarn('[preview] all capture paths failed'); return; }

  try {
    const r = await fetch(`${API_URL}/api/preview-cap/${addr}`, {
      method:  'PUT',
      headers: { 'Content-Type': contentType },
      body:    blob,
    });
    if (!r.ok) dwarn('[preview] upload', r.status, await r.text().catch(() => ''));
    else      dbg('[preview] uploaded', contentType, blob.size, 'bytes');
  } catch (e) { dwarn('[preview] upload err', e); }
}

// Listener for /configure → "save committed, please re-capture preview now".
// Only accepts same-origin senders. Force-flag bypasses the cached-preview
// short-circuit since the R2 entry (if any) is now stale.
window.addEventListener('message', (e) => {
  if (e.origin !== location.origin) return;
  if (!e.data || typeof e.data !== 'object') return;
  if (e.data.type === 'dustopia:capture') {
    const addr = window.__dustopiaWalletAddr;
    if (!addr) return;
    tryCaptureAndUploadPreview(addr, { force: true }).catch(() => {});
    return;
  }
  // PFP + MP4 captures live inside main() — they need access to the
  // live W / H / DPR / canvas so they can briefly resize the GL
  // backbuffer to the exact target size before capture. The previous
  // PFP path teed through an offscreen 2D canvas + drawImage and lost
  // sharpness on the downscale; both now sample the GL canvas at native
  // capture resolution.
});

// Fire-and-forget upload of a freshly-built atlas. Binary first (the
// expensive payload), then meta — meta is the "ready" sentinel a future
// reader checks first, so this ordering guarantees no half-cached state.
// Errors are swallowed: a failed upload just means the next visitor pays
// the build cost again, no user-visible damage.
//
// Body is a WebP-encoded 2D atlas image (~10× smaller than the prior
// raw-RGB+gzip path with imperceptible quality loss in the rendered
// sphere). The Worker's atlas PUT accepts both the legacy raw bytes and
// image/webp transparently.
async function uploadAtlas(addr, meta, atlasBlob, fp) {
  if (!API_URL || !atlasBlob) return;
  const fpQ = (fp && fp !== 'all') ? `&fp=${fp}` : '';
  const base = `${API_URL}/api/atlas/${addr}?grid=${GRID}${fpQ}`;
  try {
    const r1 = await fetch(base, {
      method:  'PUT',
      headers: { 'Content-Type': 'image/webp' },
      body:    atlasBlob,
    });
    if (!r1.ok) { dwarn('atlas bin upload', r1.status); return; }
    const r2 = await fetch(base + '&meta=1', {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(meta),
    });
    if (!r2.ok) dwarn('atlas meta upload', r2.status);
  } catch (e) { dwarn('atlas upload err', e); }
}

// Pick `cap` NFTs from `candidates` while maximising collection diversity.
// Round-robin: take the first NFT from every collection, then the second
// from every collection, etc., until we hit `cap` (or every collection is
// exhausted). A wallet with 5 000 NFTs where 500 are punks + the rest
// scattered across 50 other collections used to render as 500 punks +
// 12 stragglers; now it renders ~10 from each of 51 collections, giving
// the sphere a much wider visual range.
//
// Small wallets (≤ cap) and homogeneous wallets (one collection) are
// untouched — they degenerate to the original ordering.
function diverseSlice(candidates, cap) {
  if (candidates.length <= cap) return candidates.slice();
  const byContract = new Map();
  for (const c of candidates) {
    const key = (c.nft.contract && c.nft.contract.address || '').toLowerCase();
    let arr = byContract.get(key);
    if (!arr) { arr = []; byContract.set(key, arr); }
    arr.push(c);
  }
  const out = [];
  let depth = 0;
  let progressed = true;
  while (out.length < cap && progressed) {
    progressed = false;
    for (const arr of byContract.values()) {
      if (depth < arr.length) {
        out.push(arr[depth]);
        progressed = true;
        if (out.length >= cap) break;
      }
    }
    depth++;
  }
  return out;
}

async function buildLiveData(input) {
  // Progress milestones used by the embed-mode loader. The fill of the
  // "loading" word is bumped to each milestone as the build advances.
  // Pick wide-enough segments so loops with unknown total length still
  // make visible forward progress (e.g. NFT fetch may have 1 page or 10).
  const P_RESOLVED      = 0.05;
  const P_CACHE_CHECKED = 0.10;
  const P_NFTS_DONE     = 0.20;
  const P_IMGS_DONE     = 0.92;
  const P_ATLAS_DONE    = 0.97;

  setStatus(`<span>resolving…</span>`);
  let addr = input.trim();
  if (!addr) throw new Error('empty input');
  const original = addr;            // preserve ENS form for display + URL
  let isEns = false;
  if (/\.eth$/i.test(addr)) {
    isEns = true;
    addr = await resolveENSLive(addr);
    const shortRes = `${addr.slice(0,6)}…${addr.slice(-4)}`;
    setStatus(`<span class="ok">✓ resolved ${esc(original)} &rarr; ${esc(shortRes)}</span>`);
    await new Promise(r => setTimeout(r, 800));
  } else if (!/^0x[0-9a-fA-F]{40}$/.test(addr)) {
    throw new Error('not a valid ENS (.eth) or 0x address');
  }
  const short = `${addr.slice(0,6)}…${addr.slice(-4)}`;

  // ── Per-token config (only when an NFT id is in the URL) ────────
  // Lets the holder pick a subset of their wallet to render. Atlas cache
  // key is fingerprinted by selection so different selections for the
  // same wallet don't collide in R2.
  //
  // Precedence: live preview (sel= URL param from /configure editor) wins
  // over saved config so the editor's draft renders without round-tripping
  // through R2. Falls through to the on-server config when no override.
  let selection = { mode: 'all', collections: [], tokens: [] };
  if (window.__dustopiaLiveSelection) {
    selection = window.__dustopiaLiveSelection;
  } else if (window.__dustopiaTokenId) {
    const cfg = await tryFetchConfig(window.__dustopiaTokenId);
    if (cfg && cfg.selection) selection = cfg.selection;
  }
  const fp = await selectionFingerprint(selection);

  // ── Server cache check ──────────────────────────────────────────
  // Skip the image-fetch + canvas-build steps entirely if we have a
  // pre-built atlas in R2 for this (addr, GRID, selection). Repeat
  // visits to the same configured token (incl. every OpenSea iframe
  // load) become a single binary download. Skipped in fresh mode —
  // the holder explicitly asked to rebuild from the current wallet.
  setStatus(`<span>${window.__dustopiaFresh ? 'rebuilding' : 'checking cache'} for ${short}…</span>`);
  const cached = window.__dustopiaFresh ? null : await tryFetchCachedAtlas(addr, fp);
  if (cached) {
    setStatus(`<span class="ok">✓ cached atlas (${cached.meta.count} tokens)</span>`);
    return {
      meta:           cached.meta,
      atlasData:      cached.atlasData,
      atlasW:         cached.atlasW,
      atlasH:         cached.atlasH,
      walletAddr:     addr,
      originalInput:  original,
      isEns,
      failed:         0,
      totalRequested: cached.meta.count,
      fromCache:      true,
      selection,
      fp,
    };
  }

  setStatus(`<span>fetching NFTs for ${short}…</span>`);
  let nfts = await fetchAllNFTsLive(addr, (cnt, total) => {
    setStatus(`<span>fetching NFTs · ${cnt}${total ? ' / ~' + total : ''}</span>`);
  });
  // Apply the holder's selection (no-op when mode='all'). Done before the
  // image fetch so we don't waste bandwidth pulling thumbnails for tokens
  // the owner deliberately excluded.
  //
  // EXCEPT in preview mode (the /configure picker iframe). There the
  // user is actively iterating on which collections show — every
  // checkbox click would otherwise reload the iframe and re-fetch.
  // Preview-mode fetches the full wallet once, then applies the
  // selection as a per-slot loadedMask via postMessage. Toggle
  // becomes a single byte write, no network round-trip.
  if (!window.__dustopiaPreview) {
    nfts = filterNftsBySelection(nfts, selection);
    if (!nfts.length) throw new Error('selection produced no NFTs to render');
  } else if (!nfts.length) {
    throw new Error('wallet has no NFTs to render');
  }

  // Filter: drop Alchemy-flagged spam ONLY in 'all' mode; in 'subset'
  // mode the holder's selection is the source of truth (Alchemy's spam
  // classifier sometimes flags legit collections like CryptoPunks v1
  // — if a holder explicitly picked a contract, render it). Skip
  // anything without at least one image URL either way.
  const trustSelection = selection && selection.mode === 'subset';
  const candidates = [];
  for (const n of nfts) {
    if (!trustSelection && n.isSpam) continue;
    const urls = pickImageUrls(n);
    if (!urls.length) continue;
    candidates.push({ nft: n, urls });
  }
  if (!candidates.length) throw new Error('no renderable NFTs in wallet');
  if (candidates.length > MAX_TOKENS) {
    console.warn(`wallet has ${candidates.length} NFTs; sampling ${MAX_TOKENS} for diversity`);
  }
  const used = diverseSlice(candidates, MAX_TOKENS);

  // Progressive build: instead of awaiting every thumbnail before the
  // first paint, allocate a grey-filled skeleton atlas right now and
  // hand it back so GL setup + render-loop can start within ~1 s of
  // the wallet metadata coming in. Images then stream in via the
  // returned grow() function which texSubImages each tile into the
  // GPU texture as it lands. Caller (main()) wires that up and kicks
  // off the upload once the canvas is fully populated.
  const skeleton = allocSkeletonAtlas(used.length);
  // Meta is derived from the NFT list (collection + tokenId), not the
  // image data, so we can build it now and reuse the same object for
  // both render and the eventual R2 upload.
  const meta = buildAtlasMeta(used.map((c) => ({ nft: c.nft })));
  setStatus(`<span>fetching ${used.length} images…</span>`);
  setProgress(0, true);

  return {
    meta,
    atlasData:      skeleton.atlasData,
    atlasW:         skeleton.atlasW,
    atlasH:         skeleton.atlasH,
    walletAddr:     addr,
    originalInput:  original,
    isEns,
    failed:         0,                // updated on grow() resolve
    totalRequested: used.length,
    fromCache:      false,
    selection,
    fp,
    progressive:    true,
    grow:           (handlers) => growAtlasFrom(used, skeleton, handlers),
  };
}

function waitForLoadAndBuild() {
  return new Promise(resolve => {
    const btn   = document.getElementById('load');
    const input = document.getElementById('addr');
    const LOAD_LABEL = btn.textContent;
    async function go() {
      btn.disabled = true;
      btn.textContent = 'Loading…';
      try {
        const data = await buildLiveData(input.value);
        const failPct = data.totalRequested > 0 ? data.failed / data.totalRequested : 0;
        if (failPct > 0.3) {
          const pct = Math.round(failPct * 100);
          setStatus(`<span class="ok">✓ ${data.meta.count} tokens</span> <span class="warn">(${pct}% failed to load)</span>`);
        } else {
          setStatus(`<span class="ok">✓ ${data.meta.count} tokens · rendering…</span>`);
        }
        resolve(data);
      } catch (e) {
        console.error(e);
        setStatus(`<span class="err">✗ ${esc(e.message)}</span>`);
        // Embed mode hides #loadPanel entirely — surface the error in the
        // centered loader text instead, and stop the spinning sphere so
        // visitors see something happened rather than a stuck loader
        // forever. Auto-loaded /embed/<addr> URLs are the common failure
        // path (typo in address, network blip).
        if (document.body.classList.contains('embed')) {
          const wrap = document.getElementById('embedLoader');
          if (wrap) {
            wrap.innerHTML = '';
            const span = document.createElement('span');
            span.style.cssText = 'font-size:12px;letter-spacing:.04em;color:#9a9aa5;';
            span.textContent = `error: ${e.message}`;
            wrap.appendChild(span);
          }
        }
        btn.disabled = false;
        btn.textContent = LOAD_LABEL;
      }
    }
    btn.addEventListener('click', go);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  go();
      if (e.key === 'Escape') { input.value = ''; input.blur(); }
    });
    document.querySelectorAll('#examples a').forEach(a => {
      a.addEventListener('click', () => { input.value = a.dataset.addr; go(); });
    });
    // hash auto-load: franken_live_v2.html#xcopy.eth
    const hash = decodeURIComponent(location.hash.replace(/^#/, ''));
    if (hash) { input.value = hash; setTimeout(go, 50); }
  });
}

async function main() {
  // =============================================================
  // 1) WAIT FOR USER + LIVE BUILD
  // =============================================================
  const built = await waitForLoadAndBuild();
  const { meta, walletAddr: liveWalletAddr } = built;
  // Stash the resolved address so the postMessage listener (registered
  // before main() runs) knows whose preview to re-capture when /configure
  // pings us after a Save.
  window.__dustopiaWalletAddr = liveWalletAddr;
  const displayName = built.isEns ? built.originalInput
                                  : `${built.walletAddr.slice(0,6)}…${built.walletAddr.slice(-4)}`;

  // Update page title + URL hash so the wallet is shareable.
  document.title = `${displayName} · dustopia`;
  history.replaceState(null, '', '#' + (built.isEns ? built.originalInput : built.walletAddr));

  // Hide the embed-mode "loading" overlay now that the sphere is about to
  // paint. The full #loadPanel is already CSS-hidden in embed mode; this
  // is just the centered fill-text indicator.
  const eLoader = document.getElementById('embedLoader');
  if (eLoader) eLoader.style.display = 'none';

  // Fire the preview-capture pipeline once the swarm has settled. Skipped
  // if R2 already has a capture for this wallet (HEAD check inside) and
  // skipped entirely in editor preview mode so drafts don't overwrite
  // the canonical OpenSea grid image.
  if (!window.__dustopiaPreview && !window.__dustopiaNocache && !window.__dustopiaLanding) {
    // In fresh mode the holder explicitly asked to overwrite — skip the
    // hasCachedPreview short-circuit so the new capture lands on top of
    // whatever's currently in R2.
    const force = !!window.__dustopiaFresh;
    setTimeout(() => { tryCaptureAndUploadPreview(liveWalletAddr, { force }).catch(() => {}); }, PREVIEW_DELAY_MS);
  }

  // Collapse the load panel into a small pill that stays clickable.
  // The h1 inside displays the loaded wallet's ENS or short 0x address.
  setTimeout(() => {
    const lp = document.getElementById('loadPanel');
    if (!lp) return;
    const head  = lp.querySelector('.head');
    const h1    = lp.querySelector('h1');
    const input = document.getElementById('addr');
    const loadBtn = document.getElementById('load');
    if (h1) h1.textContent = displayName;
    lp.classList.add('collapsed');
    // Reveal the copy-link button now that we have a shareable hash.
    const copyBtn = document.getElementById('copyBtn');
    if (copyBtn) {
      copyBtn.style.display = '';
      copyBtn.addEventListener('click', e => {
        e.stopPropagation();
        navigator.clipboard?.writeText(location.href);
        const orig = copyBtn.textContent;
        copyBtn.textContent = 'copied!';
        setTimeout(() => { copyBtn.textContent = orig; }, 1200);
      });
    }
    // Click the head/h1 to re-expand.
    head?.addEventListener('click', (e) => {
      if (e.target.id === 'copyBtn' || e.target.closest('#copyBtn')) return;
      if (e.target.id === 'themeBtn' || e.target.closest('#themeBtn')) return;
      if (!lp.classList.contains('collapsed')) return;
      lp.classList.remove('collapsed');
      if (h1) h1.textContent = 'dustopia';
      if (loadBtn) { loadBtn.disabled = false; loadBtn.textContent = 'Load'; }
      if (input) { input.focus(); input.select(); }
    });
  }, 200);

  const N = meta.count;
  const tileSize = meta.lods[0];   // always 96 in live mode (LIVE_TILE)

  // =============================================================
  // 2) SETUP GL
  // =============================================================
  const canvas = document.getElementById('stage');
  // preserveDrawingBuffer:true keeps the WebGL backbuffer readable after
  // each frame so the preview-capture path can sample pixels via
  // drawImage(canvas, ...) at any moment. Without this the buffer is cleared
  // post-swap and toBlob() / drawImage() return black mid-frame. Minor perf
  // tax (~5-10%) but acceptable at 60fps on this workload.
  const gl = canvas.getContext('webgl2', { antialias: false, alpha: false, preserveDrawingBuffer: true });
  if (!gl) {
    showError('<b>WebGL2 not available.</b> Try a recent Chrome, Firefox, or Safari.');
    return;
  }

  // PFP capture needs a backbuffer big enough that drawing it into the
  // 2000×2000 PNG isn't a blurry upscale. We target ≥2400 px on the
  // canvas's shorter side and let the GL code render normally; the
  // capture handler crops/scales from there. Memory cost is bounded
  // because pfp mode is a brief one-off.
  // Landing mode (memory-tight hero iframe) caps DPR at 1.5 — enough
  // to keep ribbons sharp, low enough that a tab-sized hero stays
  // under a hundred MB on mobile.
  // Default live render: respect device DPR up to 2 on both desktop
  // and mobile.
  const _shorterSide = Math.max(1, Math.min(window.innerWidth, window.innerHeight));
  let DPR = window.__dustopiaPfp
    ? Math.min(8, Math.max(2, Math.ceil(2400 / _shorterSide)))
    : LANDING_MODE
      ? 1.5
      : Math.min(window.devicePixelRatio || 1, 2);
  let W = 0, H = 0;
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  // =============================================================
  // 3) ATLAS TEXTURE — pre-laid 2D RGB grid, ready for texImage2D.
  // =============================================================
  // allocSkeletonAtlas (cold path) and tryFetchCachedAtlas both produce
  // the atlas in 2D-grid form (atlasData / atlasW / atlasH). WebP-cached
  // atlases decode straight into the right shape; raw-RGB legacy atlases
  // get repacked inside the fetch helper before we get here.
  const TPR = ATLAS_TILES_ROW;
  const { atlasData, atlasW, atlasH } = built;

  const atlasTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, atlasTex);
  gl.pixelStorei(gl.UNPACK_ALIGNMENT, 1);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGB8, atlasW, atlasH, 0, gl.RGB, gl.UNSIGNED_BYTE, atlasData);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

  // Loaded-mask: 1D R8 texture, one byte per token (255 = thumbnail
  // landed, 0 = still pending). Vertex shader samples this and culls
  // particles for unloaded tokens by emitting them outside clip space,
  // so the sphere literally pops in slot-by-slot during the
  // progressive build instead of starting as a grey ball. For the
  // cache-hit path we mark every slot loaded up front.
  const loadedMaskData = new Uint8Array(N);
  if (!built.progressive) loadedMaskData.fill(255);
  const loadedMaskTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, loadedMaskTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.R8, N, 1, 0, gl.RED, gl.UNSIGNED_BYTE, loadedMaskData);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

  // ── Live selection mask state ────────────────────────────────
  // The vertex shader culls particles whose loadedMask byte is 0.
  // We treat that mask as a combined "loaded AND selected" flag so
  // /configure can flip selection on/off without reloading the iframe
  // — toggle becomes a single texSubImage2D byte write per affected
  // slot.
  //
  //   loadedSlots[i]   = 1 once the thumbnail is in the atlas
  //   selectedSlots[i] = 1 if token i is in the active selection
  //   mask byte        = (loadedSlots[i] && selectedSlots[i]) ? 255 : 0
  //
  // Cache-hit path: loadedSlots starts all-1 (the atlas was already
  // complete). Progressive path: starts all-0 and grow flips them.
  const loadedSlots   = new Uint8Array(N);
  if (!built.progressive) loadedSlots.fill(1);
  const selectedSlots = new Uint8Array(N);
  let currentSelection = built.selection || { mode: 'all', collections: [], tokens: [] };

  function recomputeSelectedSlots() {
    if (!currentSelection || currentSelection.mode === 'all') {
      selectedSlots.fill(1);
      return;
    }
    const cols = new Set((currentSelection.collections || []).map(s => String(s).toLowerCase()));
    const tks  = new Set((currentSelection.tokens || []).map(x => `${String(x.contract).toLowerCase()}:${x.tokenId}`));
    for (let i = 0; i < N; i++) {
      const t = built.meta.tokens[i] || {};
      const c = (t.contract || '').toLowerCase();
      const id = t.tokenId != null ? String(t.tokenId) : '';
      selectedSlots[i] = (cols.has(c) || tks.has(`${c}:${id}`)) ? 1 : 0;
    }
  }

  function rewriteMaskFromState() {
    for (let i = 0; i < N; i++) {
      loadedMaskData[i] = (loadedSlots[i] && selectedSlots[i]) ? 255 : 0;
    }
    gl.bindTexture(gl.TEXTURE_2D, loadedMaskTex);
    gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, N, 1, gl.RED, gl.UNSIGNED_BYTE, loadedMaskData);
  }

  // Single-byte fast path used by progressive grow when one slot's
  // image just landed. Avoids the full N-byte rewrite per image.
  const _maskByteScratch = new Uint8Array(1);
  function markSlotLoaded(slot) {
    loadedSlots[slot] = 1;
    const v = selectedSlots[slot] ? 255 : 0;
    if (loadedMaskData[slot] === v) return;
    loadedMaskData[slot] = v;
    _maskByteScratch[0] = v;
    gl.bindTexture(gl.TEXTURE_2D, loadedMaskTex);
    gl.texSubImage2D(gl.TEXTURE_2D, 0, slot, 0, 1, 1, gl.RED, gl.UNSIGNED_BYTE, _maskByteScratch);
  }

  // Initial computation. In preview mode we always fetched the full
  // wallet, so selectedSlots is the only thing that thins the render
  // down to the holder's choice. Outside preview the wallet was
  // already pre-filtered by selection at fetch time, so every slot
  // is selected by definition — recompute still works.
  recomputeSelectedSlots();
  rewriteMaskFromState();

  // Selection update handler. Same-origin postMessage from /configure
  // (or any future controller). Replaces the old "reload the iframe
  // with a new ?sel= param" flow — toggle is now a CPU + GL state
  // refresh, no fetch.
  function applySelectionMask(newSelection) {
    if (!newSelection || typeof newSelection !== 'object') return;
    if (newSelection.mode !== 'all' && newSelection.mode !== 'subset') return;
    currentSelection = newSelection;
    recomputeSelectedSlots();
    rewriteMaskFromState();
  }
  window.addEventListener('message', (e) => {
    if (e.origin !== location.origin) return;
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type !== 'dustopia:set-selection') return;
    applySelectionMask(e.data.selection);
  });

  // PFP capture — single-frame PNG snapshot at the requested resolution
  // (default 4096²). Lives here so it can lock the GL canvas at the
  // exact target size and read pixels straight off the WebGL
  // backbuffer; the old offscreen-2D + drawImage path scaled down a
  // ~2400 px source into the 2000² destination, costing sharpness on
  // every export. CSS dimensions stay unchanged so the iframe display
  // box doesn't twitch.
  window.addEventListener('message', (e) => {
    if (e.origin !== location.origin) return;
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type !== 'dustopia:pfp-capture') return;

    const size = (typeof e.data.size === 'number' && e.data.size > 0)
      ? Math.min(4096, Math.floor(e.data.size))
      : 4096;

    const saved = {
      W, H, DPR,
      cssW: canvas.style.width,
      cssH: canvas.style.height,
    };
    const noopResize = () => {};
    window.removeEventListener('resize', resize);
    window.addEventListener('resize', noopResize);
    W = size; H = size; DPR = 1;
    canvas.width = size; canvas.height = size;

    function restoreCanvas() {
      window.removeEventListener('resize', noopResize);
      window.addEventListener('resize', resize);
      W = saved.W; H = saved.H; DPR = saved.DPR;
      canvas.width = W * DPR; canvas.height = H * DPR;
      canvas.style.width = saved.cssW;
      canvas.style.height = saved.cssH;
    }

    // The render loop reads canvas dimensions every frame, but the
    // first rAF after a resize occasionally lands on a half-applied
    // viewport. Wait two ticks so the new size has fully propagated
    // through the position/forward textures before sampling.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        try {
          canvas.toBlob((blob) => {
            restoreCanvas();
            if (!blob) {
              e.source?.postMessage({ type: 'dustopia:pfp-blob', error: 'toBlob null' }, e.origin);
              return;
            }
            e.source?.postMessage({ type: 'dustopia:pfp-blob', blob, size }, e.origin);
          }, 'image/png');
        } catch (err) {
          restoreCanvas();
          e.source?.postMessage({ type: 'dustopia:pfp-blob', error: String(err && err.message || err) }, e.origin);
        }
      });
    });
  });

  // MP4 capture: parent /pfp asks for an N-second loop of the live sphere
  // sized for Twitter (1080×1080 default). This handler lives inside
  // main() so it can temporarily resize the GL canvas to the exact target
  // resolution before recording — that lets us run captureStream on the
  // live GL canvas directly (no GPU→CPU readback into a 2D wrapper, no
  // upscale, no per-frame drawImage). Outcome: stable frame rate and
  // sharp pixels where before we lost both to readback latency.
  //
  // Mime priority: H.264 first (Safari + recent Chrome — Twitter's
  // native fast-path, no transcode), then VP9/8 fallback.
  // Bitrate default 9 Mbps × 12 s ≈ 13.5 MB, just under the 15 MB
  // Twitter API cap with overhead headroom. Caller can override
  // duration / bitrate / size.
  window.addEventListener('message', (e) => {
    if (e.origin !== location.origin) return;
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type !== 'dustopia:mp4-capture') return;

    const opts       = e.data || {};
    const sizePx     = (typeof opts.size === 'number' && opts.size > 0)
      ? Math.min(2160, Math.floor(opts.size)) : 1080;
    const durationMs = (typeof opts.duration === 'number' && opts.duration > 0)
      ? Math.min(30_000, Math.floor(opts.duration)) : 12_000;
    const bitrate    = (typeof opts.bitrate === 'number' && opts.bitrate > 0)
      ? Math.min(20_000_000, Math.floor(opts.bitrate)) : 9_000_000;
    const fps        = 30;

    const mimeCandidates = [
      'video/mp4;codecs=avc1.42E01E',
      'video/mp4;codecs=avc1.4D401E',
      'video/mp4',
      'video/webm;codecs=vp9',
      'video/webm;codecs=vp8',
      'video/webm',
    ];
    let mime = '';
    for (const m of mimeCandidates) {
      try { if (MediaRecorder.isTypeSupported(m)) { mime = m; break; } }
      catch { /* isTypeSupported may throw on very old Safari */ }
    }
    if (!mime) {
      e.source?.postMessage({ type: 'dustopia:mp4-blob', error: 'no recordable mime' }, e.origin);
      return;
    }

    // Snapshot then lock the live canvas at sizePx². The render loop
    // reads W / H / DPR / canvas.width each frame so the new size takes
    // effect on the next rAF tick. CSS dimensions are left alone — the
    // iframe display box stays put and the browser scales the 1080²
    // backbuffer down for the user's eye while MediaRecorder samples
    // the unscaled source.
    const saved = {
      W, H, DPR,
      cssW: canvas.style.width,
      cssH: canvas.style.height,
    };
    // Ignore native window resize events while we're locked at sizePx² —
    // letting them fire would clobber the canvas size mid-recording.
    const noopResize = () => {};
