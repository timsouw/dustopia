# Wrangler config for the API Worker (api.dustopia.xyz).
# Deploy with `wrangler deploy`. See README for first-time setup.

# Worker name is fixed: api.dustopia.xyz custom domain is bound to this
# Worker, renaming would detach the route. The Pages project name (dustopia)
# is separate.
name = "franken-api"
main = "worker.js"
compatibility_date = "2026-04-25"

# Custom domain — declared before [[kv_namespaces]] so it's parsed at the
# top level instead of being absorbed into the kv_namespaces table.
routes = [
  { pattern = "api.dustopia.xyz", custom_domain = true }
]

# Match the dashboard defaults so `wrangler deploy` doesn't drift back to
# legacy values on every run.
workers_dev = true   # keep the *.workers.dev URL as a backup access path
preview_urls = true

[observability]
enabled = true

[observability.logs]
enabled = true

# KV: wallet/ENS cache, owner lookups, rate-limit counters, preview-cap floors.
[[kv_namespaces]]
binding = "WALLET_CACHE"
id      = "043aff23e1894533b81aaab958718377"

# R2: atlas binaries (keyed by addr+grid+selection-fingerprint), per-token
# configs, captured preview WebPs. Public access OFF — all I/O via Worker.
[[r2_buckets]]
binding     = "ATLAS"
bucket_name = "dustopia-atlas"
