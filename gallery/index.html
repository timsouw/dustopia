<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gallery · dustopia</title>
<meta name="description" content="Every minted Dustopia token, side by side. Each tile is a live sphere of the holder's NFT collection.">

<meta property="og:type" content="website">
<meta property="og:url" content="https://dustopia.xyz/gallery">
<meta property="og:title" content="dustopia · gallery">
<meta property="og:description" content="Every minted Dustopia, side by side.">
<meta property="og:image" content="https://api.dustopia.xyz/api/preview/1">

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%;
    background:#14141a; color:#e7e7ea;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  body.light { background:#f4f4f5; color:#18181b; }
  body { min-height:100vh; }
  a { color:inherit; text-decoration:none; }
  ::selection { background:#7262d4; color:#fff; }
  body.light ::selection { background:#18181b; color:#fafafa; }

  .mono { font-family:"SF Mono","Menlo",ui-monospace,monospace; font-size:.86em; letter-spacing:.02em; }
  .label {
    display:inline-block;
    font-family:"SF Mono","Menlo",ui-monospace,monospace;
    font-size:10px; letter-spacing:.18em; text-transform:uppercase;
    color:#7a7a85;
  }
  body.light .label { color:#71717a; }

  /* Header — matches landing/holder/pfp */
  header {
    position:sticky; top:0; z-index:50;
    background:rgba(20,20,26,.72);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  body.light header { background:rgba(244,244,245,.78); border-bottom-color:rgba(0,0,0,.06); }
  header .bar {
    display:flex; align-items:center;
    height:54px; max-width:1240px; margin:0 auto; padding:0 24px;
  }
  .brand { display:flex; align-items:center; gap:10px; font-size:14px; font-weight:600; letter-spacing:-0.01em; }
  .brand-mark {
    width:18px; height:18px; border-radius:50%;
    background:radial-gradient(38% 32% at 38% 32%, #ffffff 0%, #d8d2ff 30%, #7262d4 60%, #120a2a 100%);
  }
  .nav-links { display:flex; align-items:center; gap:6px; }
  .nav-link {
    padding:6px 12px; border-radius:6px;
    font-size:12px; letter-spacing:.02em; color:#9a9aa5;
    transition:color 120ms, background 120ms;
  }
  .nav-link:hover { color:#e7e7ea; background:rgba(255,255,255,.05); }
  body.light .nav-link { color:#71717a; }
  body.light .nav-link:hover { color:#18181b; background:rgba(0,0,0,.04); }
  .nav-link.current { color:#e7e7ea; background:rgba(255,255,255,.06); }
  body.light .nav-link.current { color:#18181b; background:rgba(0,0,0,.05); }
  .icon-btn {
    background:transparent; border:1px solid rgba(255,255,255,.14);
    color:inherit; cursor:pointer;
    width:30px; height:30px; border-radius:7px;
    display:inline-flex; align-items:center; justify-content:center;
    margin-left:6px;
  }
  .icon-btn:hover { border-color:rgba(255,255,255,.4); }
  body.light .icon-btn { border-color:rgba(0,0,0,.14); }
  body.light .icon-btn:hover { border-color:rgba(0,0,0,.4); }
  .icon-btn svg { width:14px; height:14px; }
  /* Push the nav (and the bar-actions cluster after it) to the right
     edge. When the nav collapses on mobile, .bar-actions stays anchored
     to the right because it inherits the position from the parent flex
     row, while .nav-links breaks out absolutely as a dropdown. */
  /* On mobile the .nav-links is position:absolute when the dropdown
     is open; if it had the only auto margin, .bar-actions would slide
     left next to .brand. Anchor .bar-actions on its own; on desktop
     the media query below restores the nav-links auto-margin so the
     links group stays right-aligned next to the actions. */
  .bar-actions { display:flex; align-items:center; margin-left:auto; }
  @media (min-width: 721px) {
    .nav-links { margin-left:auto; }
    .bar-actions { margin-left:0; }
  }


  /* Mobile hamburger — see landing page for the same pattern. */
  .nav-toggle {
    display:none;
    background:transparent; border:0;
    color:inherit; cursor:pointer;
    width:30px; height:30px; padding:0;
    margin-left:6px;
  }
  .nav-toggle svg { width:16px; height:16px; }
  @media (max-width: 720px) {
    .nav-toggle { display:inline-flex; align-items:center; justify-content:center; }
    .nav-links .nav-link { display:none; }
    body.nav-open .nav-links {
      position:absolute; top:54px; left:0; right:0;
      flex-direction:column; gap:0; align-items:stretch;
      background:rgba(20,20,26,.96);
      backdrop-filter:blur(14px) saturate(140%);
      -webkit-backdrop-filter:blur(14px) saturate(140%);
      padding:8px 0;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    body.light.nav-open .nav-links {
      background:rgba(244,244,245,.96);
      border-bottom-color:rgba(0,0,0,.08);
    }
    body.nav-open .nav-link {
      display:block;
      padding:14px 24px;
      border-radius:0;
      font-size:14px;
    }
  }

  /* Page body */
  .wrap { width:100%; max-width:1240px; margin:0 auto; padding:36px 24px 64px; }

  .gallery-head {
    display:flex; flex-direction:column; gap:8px;
    margin-bottom:32px;
    padding-bottom:24px;
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  body.light .gallery-head { border-bottom-color:rgba(0,0,0,.08); }
  .gallery-head h1 {
    font-size:32px; font-weight:600; letter-spacing:-0.02em; line-height:1.1;
  }
  .gallery-head p {
    font-size:14px; line-height:1.55; color:#9a9aa5; max-width:60ch;
  }
  body.light .gallery-head p { color:#52525b; }
  .gallery-head .stats {
    display:flex; gap:24px; flex-wrap:wrap;
    margin-top:6px;
    font-size:12px; color:#9a9aa5;
  }
  body.light .gallery-head .stats { color:#52525b; }
  .gallery-head .stats b { color:#e7e7ea; font-weight:600; }
  body.light .gallery-head .stats b { color:#18181b; }

  /* Grid of circular token tiles. The `aspect-ratio: 1` on the tile
     keeps each cell square; the inner sphere clips to a circle. The
     auto-fill grid breaks responsively without media queries. */
  .token-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
    gap:24px;
  }
  .tile {
    position:relative;
    aspect-ratio:1 / 1;
    border-radius:50%;
    overflow:hidden;
    cursor:pointer;
    background:#0e0e14;
    border:1px solid rgba(255,255,255,.06);
    transition:transform 220ms cubic-bezier(.2,.7,.2,1),
               border-color 220ms;
  }
  body.light .tile { background:#e9e9ec; border-color:rgba(0,0,0,.06); }
  .tile:hover { transform:scale(1.02); border-color:rgba(255,255,255,.22); }
  body.light .tile:hover { border-color:rgba(0,0,0,.22); }

  .tile img {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    transition:filter 260ms;
  }
  /* Until the tile enters the viewport (and the IntersectionObserver
     swaps in the real preview) the img has no src — show a gentle
     placeholder so the circle isn't a black hole. */
  .tile.is-pending { background:linear-gradient(135deg, #1a1a22 0%, #0e0e14 100%); }
  body.light .tile.is-pending { background:linear-gradient(135deg, #f0f0f3 0%, #e2e2e6 100%); }

  /* Hover overlay: blur the sphere behind, drop the token name on top.
     We use backdrop-filter so the blur applies to whatever the img is
     painting underneath, which keeps animated frames blurring smoothly
     instead of stuttering between snapshot states. */
  .tile-overlay {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:4px;
    color:#fafafa;
    opacity:0;
    backdrop-filter:blur(0px) brightness(.85);
    -webkit-backdrop-filter:blur(0px) brightness(.85);
    background:rgba(20,20,26,0);
    transition:opacity 200ms, backdrop-filter 240ms,
               -webkit-backdrop-filter 240ms, background 240ms;
    pointer-events:none;
    text-align:center;
    padding:0 18px;
  }
  .tile:hover .tile-overlay {
    opacity:1;
    backdrop-filter:blur(8px) brightness(.7);
    -webkit-backdrop-filter:blur(8px) brightness(.7);
    background:rgba(20,20,26,.18);
  }
  body.light .tile:hover .tile-overlay { background:rgba(244,244,245,.18); }
  .tile-overlay .name {
    font-size:18px; font-weight:600; letter-spacing:-0.01em;
    color:#fafafa;
  }
  .tile-overlay .sub {
    font-family:"SF Mono","Menlo",ui-monospace,monospace;
    font-size:10.5px; letter-spacing:.04em; color:rgba(250,250,250,.7);
  }

  /* Modal — opens on tile click. Single instance, populated per click.
     Click on backdrop or Escape closes; click inside the card stays. */
  .modal-backdrop {
    position:fixed; inset:0; z-index:200;
    display:none; align-items:center; justify-content:center;
    padding:24px;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .modal-backdrop.open { display:flex; }
  body.light .modal-backdrop { background:rgba(20,20,26,.42); }
  .modal-card {
    width:100%; max-width:520px;
    max-height:calc(100vh - 48px);
    display:flex; flex-direction:column;
    background:#16161d;
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    overflow:hidden;
    color:#e7e7ea;
  }
  body.light .modal-card { background:#fafafa; color:#18181b; border-color:rgba(0,0,0,.08); }
  .modal-hero {
    aspect-ratio:1 / 1;
    background:#0e0e14;
    overflow:hidden;
    border-bottom:1px solid rgba(255,255,255,.06);
    position:relative;
  }
  body.light .modal-hero { background:#e9e9ec; border-bottom-color:rgba(0,0,0,.06); }
  .modal-hero img { width:100%; height:100%; object-fit:cover; display:block; }
  .modal-body {
    padding:22px 24px 24px;
    overflow-y:auto;
    display:flex; flex-direction:column; gap:14px;
  }
  .modal-title {
    font-size:22px; font-weight:600; letter-spacing:-0.015em;
  }
  .modal-desc {
    font-size:13px; line-height:1.55; color:#9a9aa5;
  }
  body.light .modal-desc { color:#52525b; }
  .modal-traits {
    display:grid; grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:8px;
  }
  .trait {
    padding:10px 12px;
    border:1px solid rgba(255,255,255,.06);
    border-radius:8px;
    background:rgba(255,255,255,.02);
    display:flex; flex-direction:column; gap:2px;
  }
  body.light .trait { border-color:rgba(0,0,0,.06); background:rgba(0,0,0,.02); }
  .trait .k {
    font-family:"SF Mono","Menlo",ui-monospace,monospace;
    font-size:9.5px; letter-spacing:.12em; text-transform:uppercase;
    color:#7a7a85;
  }
  body.light .trait .k { color:#71717a; }
  .trait .v {
    font-size:13px; font-weight:500; letter-spacing:-0.005em;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .modal-actions {
    display:flex; gap:8px; flex-wrap:wrap;
    padding-top:4px;
  }
  .modal-actions a {
    flex:1; min-width:140px;
    padding:9px 12px; border-radius:8px;
    font-size:12px; font-weight:500; letter-spacing:-0.005em;
    text-align:center;
    border:1px solid rgba(255,255,255,.14);
    color:#e7e7ea;
    transition:border-color 140ms, background 140ms;
  }
  .modal-actions a:hover { border-color:#e7e7ea; background:rgba(255,255,255,.04); }
  .modal-actions a.primary {
    background:#e7e7ea; color:#101217; border-color:#e7e7ea;
  }
  .modal-actions a.primary:hover { background:#fff; color:#101217; }
  body.light .modal-actions a { color:#18181b; border-color:rgba(0,0,0,.18); }
  body.light .modal-actions a:hover { border-color:#000; background:rgba(0,0,0,.03); }
  body.light .modal-actions a.primary { background:#18181b; color:#fafafa; border-color:#18181b; }
  body.light .modal-actions a.primary:hover { background:#000; color:#fafafa; }
  .modal-close {
    position:absolute; top:12px; right:12px; z-index:1;
    width:30px; height:30px; border-radius:50%;
    background:rgba(0,0,0,.5); color:#fafafa;
    border:0; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:18px; line-height:1;
  }
  .modal-close:hover { background:rgba(0,0,0,.7); }

  .empty-state, .error-state {
    padding:60px 24px;
    text-align:center;
    border:1px dashed rgba(255,255,255,.08);
    border-radius:12px;
    color:#9a9aa5;
    font-size:14px; line-height:1.55;
  }
  body.light .empty-state, body.light .error-state {
    border-color:rgba(0,0,0,.08); color:#52525b;
  }
  .empty-state .cta {
    display:inline-block;
    margin-top:14px;
    padding:9px 16px; border-radius:8px;
    background:#e7e7ea; color:#101217;
    font-size:12.5px; font-weight:600;
  }
  body.light .empty-state .cta { background:#18181b; color:#fafafa; }

  /* Skeleton loader — circles to match the live grid. */
  .skeleton-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
    gap:24px;
  }
  .skeleton-card {
    aspect-ratio:1 / 1;
    border-radius:50%;
    background:linear-gradient(90deg,
      rgba(255,255,255,.03) 0%,
      rgba(255,255,255,.06) 50%,
      rgba(255,255,255,.03) 100%);
    background-size:200% 100%;
    animation:skel 1.4s ease-in-out infinite;
  }
  body.light .skeleton-card {
    background:linear-gradient(90deg,
      rgba(0,0,0,.03) 0%, rgba(0,0,0,.06) 50%, rgba(0,0,0,.03) 100%);
    background-size:200% 100%;
  }
  @keyframes skel {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body class="light">

<header>
  <div class="bar">

      <span class="brand-mark" aria-hidden="true"></span>

    <nav class="nav-links" aria-label="primary">

<main class="wrap">
  <section class="gallery-head">
    <span class="label">gallery</span>

    <p>One tile per token. Each preview animates the live sphere of its holder's wallet. Click into a tile to drag, zoom and explore.</p>

<div id="modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">

    <button class="modal-close" id="modalClose" type="button" aria-label="close">×</button>

</div>

<script>
  window.safeStorage = (function() {
    let mem = {};
    try {
      const k = '__t';
      localStorage.setItem(k, k); localStorage.removeItem(k);
      return {
        get: (k) => { try { return localStorage.getItem(k); } catch { return mem[k] ?? null; } },
        set: (k, v) => { try { localStorage.setItem(k, v); } catch { mem[k] = v; } },
      };
    } catch {
      return { get: (k) => mem[k] ?? null, set: (k, v) => { mem[k] = v; } };
    }
  })();
  (function() {
    const saved = safeStorage.get('franken-theme');
    if (saved === 'dark') document.body.classList.remove('light');
    else                  document.body.classList.add('light');
  })();
</script>

<script>
  const sun  = '<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><circle cx="8" cy="8" r="3"/><path d="M8 0v3M8 13v3M0 8h3M13 8h3M2.3 2.3l2.1 2.1M11.6 11.6l2.1 2.1M2.3 13.7l2.1-2.1M11.6 4.4l2.1-2.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>';
  (function() {
    const btn = document.getElementById('themeBtn');
    function syncIcon() { btn.innerHTML = sun; }
    syncIcon();
    btn.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      safeStorage.set('franken-theme', isLight ? 'light' : 'dark');
      syncIcon();
    });
  })();

  // Mobile hamburger toggle.
  (function() {
    const t = document.getElementById('navToggle');
    if (t) t.addEventListener('click', () => document.body.classList.toggle('nav-open'));
    document.querySelectorAll('.nav-links .nav-link').forEach(a => {
      a.addEventListener('click', () => document.body.classList.remove('nav-open'));
    });
  })();

  const API_URL = 'https://api.dustopia.xyz';

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => (
      { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
    ));
  }
  function shortAddr(a) { return `${a.slice(0,6)}…${a.slice(-4)}`; }

  function renderSkeletons(n = 8) {
    const cards = Array.from({ length: n }).map(() =>
      `<div class="skeleton-card"></div>`
    ).join('');
    document.getElementById('grid').innerHTML = `
      <div class="skeleton-grid">${cards}</div>`;
  }

  function renderEmpty() {
    document.getElementById('grid').innerHTML = `
      <div class="empty-state">
        No Dustopias have been minted yet.<br>
        <a href="/pfp" class="cta">Try the explorer →</a>
      </div>`;
  }

  function renderError(msg) {
    document.getElementById('grid').innerHTML =
      `<div class="error-state">${escHtml(msg)}</div>`;
  }

  // Tiny transparent placeholder used while a tile is off-screen. Setting
  // src='' would show a broken-image icon in some browsers; an actual data
  // URL keeps the <img> happy and frees the previous animated WebP.
  const BLANK_IMG = 'data:image/gif;base64,R0lGODlhAQABAAAAACw=';

  // Render circular tiles, one per token. The img has `data-src` until
  // the IntersectionObserver swaps the live preview URL in. While not
  // visible the img stays on the placeholder so an animated WebP isn't
  // running off-screen and chewing CPU/GPU. The whole tile is one big
  // click target that opens the modal.
  function renderTokens(tokens) {
    if (!tokens.length) { renderEmpty(); return; }
    const cards = tokens.map((t) => {
      const stat = (t.tokens != null && t.collections != null)
        ? `${t.tokens}t · ${t.collections}c`
        : `${escHtml(shortAddr(t.owner))}`;
      return `
        <div class="tile is-pending"
             data-token-id="${escHtml(t.tokenId)}"
             data-owner="${escHtml(t.owner)}"
             title="Dustopia #${escHtml(t.tokenId)}">
          <img alt="Dustopia #${escHtml(t.tokenId)}"
               src="${BLANK_IMG}"
               data-src="${API_URL}/api/preview/${escHtml(t.tokenId)}"
               decoding="async">
          <div class="tile-overlay">
            <span class="name">Dustopia #${escHtml(t.tokenId)}</span>
            <span class="sub">${stat}</span>
          </div>
        </div>`;
    }).join('');
    const grid = document.getElementById('grid');
    grid.innerHTML = `<div class="token-grid">${cards}</div>`;

    // Observe every tile. When intersecting, swap to the live preview;
    // when scrolled out of view, swap back to the blank placeholder so
    // the browser drops the animated frames. Threshold 0.05 is enough
    // to debounce micro-scrolls without leaving torn animations.
    const io = new IntersectionObserver((entries) => {
      for (const e of entries) {
        const tile = e.target;
        const img = tile.querySelector('img');
        if (!img) continue;
        if (e.isIntersecting) {
          if (img.src !== img.dataset.src) img.src = img.dataset.src;
          tile.classList.remove('is-pending');
        } else {
          if (img.src !== BLANK_IMG) img.src = BLANK_IMG;
        }
      }
    }, { rootMargin: '200px 0px', threshold: 0.05 });
    grid.querySelectorAll('.tile').forEach((tile) => io.observe(tile));

    // Click → modal. Delegated so we don't pin a listener per tile.
    grid.addEventListener('click', onGridClick);
  }

  function onGridClick(ev) {
    const tile = ev.target.closest('.tile');
    if (!tile) return;
    openModal(tile.dataset.tokenId, tile.dataset.owner);
  }

  // ── Modal ───────────────────────────────────────────────────
  // One modal node, populated per click. Body fetches the metadata JSON
  // straight from the worker (cheap — it's edge-cached) so we can show
  // OpenSea-equivalent traits + description without baking that into
  // the gallery list endpoint.
  const modal      = document.getElementById('modal');
  const modalHero  = document.getElementById('modalHero');
  const modalBody  = document.getElementById('modalBody');
  const modalClose = document.getElementById('modalClose');

  function openModal(tokenId, owner) {
    if (!tokenId) return;
    modalHero.innerHTML = `
      <img src="${API_URL}/api/preview/${escHtml(tokenId)}"
           alt="Dustopia #${escHtml(tokenId)}">`;
    modalBody.innerHTML = `
      <div class="modal-title">Dustopia #${escHtml(tokenId)}</div>
      <div class="modal-desc">Loading…</div>`;
    modal.classList.add('open');
    modal.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';

    fetch(`${API_URL}/api/metadata/${encodeURIComponent(tokenId)}`)
      .then((r) => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
      .then((meta) => {
        const traits = (meta.attributes || []).map((a) => `
          <div class="trait">
            <span class="k">${escHtml(a.trait_type ?? '')}</span>
            <span class="v" title="${escHtml(String(a.value))}">${escHtml(String(a.value))}</span>
          </div>`).join('');
        const ownerAddr = owner || '';
        const liveUrl = ownerAddr
          ? `/embed/${encodeURIComponent(ownerAddr)}?token=${encodeURIComponent(tokenId)}`
          : (meta.animation_url || '#');
        const holderUrl = ownerAddr ? `/holder/${encodeURIComponent(ownerAddr)}` : '';
        modalBody.innerHTML = `
          <div class="modal-title">${escHtml(meta.name || `Dustopia #${tokenId}`)}</div>
          ${meta.description ? `<div class="modal-desc">${escHtml(meta.description)}</div>` : ''}
          ${traits ? `<div class="modal-traits">${traits}</div>` : ''}
          <div class="modal-actions">
            <a href="${liveUrl}" class="primary">Open live sphere →</a>
            ${holderUrl ? `<a href="${holderUrl}">Holder profile</a>` : ''}
          </div>`;
      })
      .catch((e) => {
        modalBody.innerHTML = `
          <div class="modal-title">Dustopia #${escHtml(tokenId)}</div>
          <div class="modal-desc">Couldn't load metadata: ${escHtml(e.message)}</div>`;
      });
  }

  function closeModal() {
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    // Drop the hero img src so the animated WebP isn't decoding behind
    // the closed modal.
    modalHero.innerHTML = '';
  }

  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });
  modalClose.addEventListener('click', closeModal);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
  });

  async function init() {
    renderSkeletons(8);
    let data;
    try {
      const r = await fetch(`${API_URL}/api/all-tokens`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      data = await r.json();
    } catch (e) {
      renderError(`Couldn't load gallery: ${e.message}`);
      return;
    }
    const tokens = Array.isArray(data.tokens) ? data.tokens : [];
    // Most recent mints first (highest tokenId at the top).
    tokens.sort((a, b) => Number(b.tokenId) - Number(a.tokenId));

    const stats = document.getElementById('galleryStats');
    stats.hidden = false;
    const uniqueOwners = new Set(tokens.map(t => t.owner)).size;
    stats.innerHTML = `
      <span><b>${data.totalSupply ?? tokens.length}</b> minted</span>
      <span><b>${uniqueOwners}</b> ${uniqueOwners === 1 ? 'holder' : 'holders'}</span>`;

    renderTokens(tokens);
  }

  init();
</script>

</body>
</html>
