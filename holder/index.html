<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>holder · dustopia</title>
<meta name="description" content="Dustopia tokens owned by this address. Each token is a configurable sphere of the holder's NFTs.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><radialGradient id='g' cx='38%25' cy='32%25' r='65%25'><stop offset='0%25' stop-color='%23ffffff' stop-opacity='1'/><stop offset='30%25' stop-color='%23d8d2ff' stop-opacity='0.95'/><stop offset='60%25' stop-color='%237262d4' stop-opacity='0.85'/><stop offset='100%25' stop-color='%23120a2a' stop-opacity='1'/></radialGradient></defs><circle cx='32' cy='32' r='28' fill='url(%23g)'/></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%;
    background:#14141a; color:#e7e7ea;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  body.light { background:#f4f4f5; color:#18181b; }
  body { min-height:100vh; }
  a { color:inherit; text-decoration:none; }
  ::selection { background:#7262d4; color:#fff; }
  body.light ::selection { background:#18181b; color:#fafafa; }

  .mono { font-family:"SF Mono","Menlo",ui-monospace,monospace; font-size:.86em; letter-spacing:.02em; }
  .label {
    display:inline-block;
    font-family:"SF Mono","Menlo",ui-monospace,monospace;
    font-size:10px; letter-spacing:.18em; text-transform:uppercase;
    color:#7a7a85;
  }
  body.light .label { color:#71717a; }

  /* Header */
  header {
    position:sticky; top:0; z-index:50;
    background:rgba(20,20,26,.72);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  body.light header { background:rgba(244,244,245,.78); border-bottom-color:rgba(0,0,0,.06); }
  header .bar {
    display:flex; align-items:center;
    height:54px; max-width:1180px; margin:0 auto; padding:0 24px;
  }
  .brand { display:flex; align-items:center; gap:10px; font-size:14px; font-weight:600; letter-spacing:-0.01em; }
  .brand-mark {
    width:18px; height:18px; border-radius:50%;
    background:radial-gradient(38% 32% at 38% 32%, #ffffff 0%, #d8d2ff 30%, #7262d4 60%, #120a2a 100%);
  }
  .nav-links { display:flex; align-items:center; gap:6px; }
  .nav-link {
    padding:6px 12px; border-radius:6px;
    font-size:12px; letter-spacing:.02em; color:#9a9aa5;
    transition:color 120ms, background 120ms;
  }
  .nav-link:hover { color:#e7e7ea; background:rgba(255,255,255,.05); }
  body.light .nav-link { color:#71717a; }
  body.light .nav-link:hover { color:#18181b; background:rgba(0,0,0,.04); }
  .icon-btn {
    background:transparent; border:1px solid rgba(255,255,255,.14);
    color:inherit; cursor:pointer;
    width:30px; height:30px; border-radius:7px;
    display:inline-flex; align-items:center; justify-content:center;
    margin-left:6px;
  }
  .icon-btn:hover { border-color:rgba(255,255,255,.4); }
  body.light .icon-btn { border-color:rgba(0,0,0,.14); }
  body.light .icon-btn:hover { border-color:rgba(0,0,0,.4); }
  .icon-btn svg { width:14px; height:14px; }
  /* Push the nav (and the bar-actions cluster after it) to the right
     edge. When the nav collapses on mobile, .bar-actions stays anchored
     to the right because it inherits the position from the parent flex
     row, while .nav-links breaks out absolutely as a dropdown. */
  /* On mobile the .nav-links is position:absolute when the dropdown
     is open; if it had the only auto margin, .bar-actions would slide
     left next to .brand. Anchor .bar-actions on its own; on desktop
     the media query below restores the nav-links auto-margin so the
     links group stays right-aligned next to the actions. */
  .bar-actions { display:flex; align-items:center; margin-left:auto; }
  @media (min-width: 721px) {
    .nav-links { margin-left:auto; }
    .bar-actions { margin-left:0; }
  }


  /* Mobile hamburger — see landing page for the same pattern. */
  .nav-toggle {
    display:none;
    background:transparent; border:0;
    color:inherit; cursor:pointer;
    width:30px; height:30px; padding:0;
    margin-left:6px;
  }
  .nav-toggle svg { width:16px; height:16px; }
  @media (max-width: 720px) {
    .nav-toggle { display:inline-flex; align-items:center; justify-content:center; }
    .nav-links .nav-link { display:none; }
    body.nav-open .nav-links {
      position:absolute; top:54px; left:0; right:0;
      flex-direction:column; gap:0; align-items:stretch;
      background:rgba(20,20,26,.96);
      backdrop-filter:blur(14px) saturate(140%);
      -webkit-backdrop-filter:blur(14px) saturate(140%);
      padding:8px 0;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    body.light.nav-open .nav-links {
      background:rgba(244,244,245,.96);
      border-bottom-color:rgba(0,0,0,.08);
    }
    body.nav-open .nav-link {
      display:block;
      padding:14px 24px;
      border-radius:0;
      font-size:14px;
    }
  }

  /* Profile body */
  .wrap { width:100%; max-width:1180px; margin:0 auto; padding:36px 24px 64px; }

  .profile-head {
    display:flex; flex-direction:column; gap:8px;
    margin-bottom:36px;
    padding-bottom:24px;
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  body.light .profile-head { border-bottom-color:rgba(0,0,0,.08); }
  .profile-head h1 {
    font-family:'Instrument Serif', Georgia, "Times New Roman", serif;
    font-size:48px; font-weight:400; letter-spacing:-0.025em;
    line-height:1.05;
  }
  .profile-head .addr {
    font-family:"SF Mono","Menlo",ui-monospace,monospace;
    font-size:12px; letter-spacing:.02em;
    color:#7a7a85;
    word-break:break-all;
  }
  body.light .profile-head .addr { color:#71717a; }
  .profile-head .stats {
    display:flex; gap:24px; flex-wrap:wrap;
    margin-top:6px;
    font-size:12px; color:#9a9aa5;
  }
  body.light .profile-head .stats { color:#52525b; }
  .profile-head .stats b { color:#e7e7ea; font-weight:600; }
  body.light .profile-head .stats b { color:#18181b; }

  /* Token grid */
  .token-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:18px;
  }
  .token-card {
    display:flex; flex-direction:column;
    background:rgba(255,255,255,.025);
    border:1px solid rgba(255,255,255,.06);
    border-radius:12px;
    overflow:hidden;
    transition:border-color 200ms, transform 200ms;
  }
  .token-card:hover { border-color:rgba(255,255,255,.18); transform:translateY(-2px); }
  body.light .token-card { background:rgba(0,0,0,.02); border-color:rgba(0,0,0,.06); }
  body.light .token-card:hover { border-color:rgba(0,0,0,.18); }
  .token-img-wrap {
    position:relative;
    aspect-ratio:1 / 1;
    background:#14141a;
    overflow:hidden;
  }
  body.light .token-img-wrap { background:#e9e9ec; }
  .token-img-wrap img {
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .token-meta {
    padding:14px 16px 16px;
    display:flex; align-items:center; justify-content:space-between;
    gap:8px;
  }
  .token-name {
    font-size:13.5px; font-weight:600; letter-spacing:-0.005em;
  }
  .token-id {
    font-family:"SF Mono","Menlo",ui-monospace,monospace;
    font-size:11px; color:#7a7a85;
  }
  body.light .token-id { color:#71717a; }

  .empty-state, .error-state {
    padding:48px 24px;
    text-align:center;
    border:1px dashed rgba(255,255,255,.08);
    border-radius:12px;
    color:#9a9aa5;
    font-size:14px; line-height:1.55;
  }
  body.light .empty-state, body.light .error-state {
    border-color:rgba(0,0,0,.08); color:#52525b;
  }
  .empty-state .cta {
    display:inline-block;
    margin-top:14px;
    padding:9px 16px; border-radius:8px;
    background:#e7e7ea; color:#101217;
    font-size:12.5px; font-weight:600;
  }
  body.light .empty-state .cta { background:#18181b; color:#fafafa; }

  /* Loading skeleton — placeholder cards while fetching */
  .skeleton-card {
    aspect-ratio: 1 / 1;
    border-radius:12px;
    background:linear-gradient(90deg,
      rgba(255,255,255,.03) 0%,
      rgba(255,255,255,.06) 50%,
      rgba(255,255,255,.03) 100%);
    background-size:200% 100%;
    animation:skel 1.4s ease-in-out infinite;
  }
  body.light .skeleton-card {
    background:linear-gradient(90deg,
      rgba(0,0,0,.03) 0%, rgba(0,0,0,.06) 50%, rgba(0,0,0,.03) 100%);
    background-size:200% 100%;
  }
  @keyframes skel {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body class="light">

<header>
  <div class="bar">
    <a href="/" class="brand" aria-label="dustopia home">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>dustopia</span>
    </a>
    <nav class="nav-links" aria-label="primary">
      <a href="/#how" class="nav-link">how it works</a>
      <a href="/pfp" class="nav-link">save as pfp</a>
      <a href="/configure" class="nav-link">configure</a>
      <a href="/gallery" class="nav-link">gallery</a>
      <a href="/leaderboard" class="nav-link">leaderboard</a>
    </nav>
    <div class="bar-actions">
      <button id="themeBtn" class="icon-btn" type="button" aria-label="toggle theme" title="toggle theme">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><circle cx="8" cy="8" r="3"/><path d="M8 0v3M8 13v3M0 8h3M13 8h3M2.3 2.3l2.1 2.1M11.6 11.6l2.1 2.1M2.3 13.7l2.1-2.1M11.6 4.4l2.1-2.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
      <button id="navToggle" class="nav-toggle" type="button" aria-label="toggle menu" title="menu">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <rect x="2" y="3.25" width="12" height="1.5" rx="0.75"/>
          <rect x="2" y="7.25" width="12" height="1.5" rx="0.75"/>
          <rect x="2" y="11.25" width="12" height="1.5" rx="0.75"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<main class="wrap">
  <section class="profile-head">
    <span class="label">holder</span>
    <h1 id="holderTitle">…</h1>
    <span class="addr mono" id="holderAddr"></span>
    <div class="stats" id="holderStats" hidden></div>
  </section>

  <section id="tokens"></section>
</main>

<script>
  // safeStorage shim — sandboxed contexts sometimes throw on localStorage.
  window.safeStorage = (function() {
    let mem = {};
    try {
      const k = '__t';
      localStorage.setItem(k, k); localStorage.removeItem(k);
      return {
        get: (k) => { try { return localStorage.getItem(k); } catch { return mem[k] ?? null; } },
        set: (k, v) => { try { localStorage.setItem(k, v); } catch { mem[k] = v; } },
      };
    } catch {
      return { get: (k) => mem[k] ?? null, set: (k, v) => { mem[k] = v; } };
    }
  })();
  (function() {
    const saved = safeStorage.get('franken-theme');
    if (saved === 'dark') document.body.classList.remove('light');
    else                  document.body.classList.add('light');
  })();
</script>
<script>
  const sun  = '<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><circle cx="8" cy="8" r="3"/><path d="M8 0v3M8 13v3M0 8h3M13 8h3M2.3 2.3l2.1 2.1M11.6 11.6l2.1 2.1M2.3 13.7l2.1-2.1M11.6 4.4l2.1-2.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>';

  (function() {
    const btn = document.getElementById('themeBtn');
    function syncIcon() { btn.innerHTML = sun; }
    syncIcon();
    btn.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      safeStorage.set('franken-theme', isLight ? 'light' : 'dark');
      syncIcon();
    });
  })();

  // Mobile hamburger toggle.
  (function() {
    const t = document.getElementById('navToggle');
    if (t) t.addEventListener('click', () => document.body.classList.toggle('nav-open'));
    document.querySelectorAll('.nav-links .nav-link').forEach(a => {
      a.addEventListener('click', () => document.body.classList.remove('nav-open'));
    });
  })();

  const API_URL = 'https://api.dustopia.xyz';

  // Path parse: /holder/<addr-or-ens>. _redirects rewrites /holder/* →
  // /holder/, so the actual address ends up in the URL path. We slice it
  // out of location.pathname rather than relying on hash.
  function parseHolderFromPath() {
    const m = location.pathname.match(/^\/holder\/([^/?#]+)\/?$/);
    if (!m) return null;
    try { return decodeURIComponent(m[1]).toLowerCase(); }
    catch { return null; }
  }

  function looksLikeAddr(s) { return /^0x[0-9a-f]{40}$/.test(s); }
  function looksLikeEns(s)  { return /^[a-z0-9-]+(?:\.[a-z0-9-]+)*\.eth$/.test(s); }

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => (
      { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
    ));
  }

  function shortAddr(a) {
    return `${a.slice(0,6)}…${a.slice(-4)}`;
  }

  async function resolve0x(input) {
    if (looksLikeAddr(input)) return input;
    if (!looksLikeEns(input)) throw new Error('Not a valid address or ENS');
    const r = await fetch(`${API_URL}/api/ens/${encodeURIComponent(input)}`);
    if (!r.ok) throw new Error(`ENS HTTP ${r.status}`);
    const j = await r.json();
    const addr = (j.address || j.resolved || '').toLowerCase();
    if (!looksLikeAddr(addr)) throw new Error('ENS returned no address');
    return addr;
  }

  function renderError(msg) {
    document.getElementById('tokens').innerHTML =
      `<div class="error-state">${escHtml(msg)}</div>`;
  }

  function renderEmpty() {
    document.getElementById('tokens').innerHTML = `
      <div class="empty-state">
        This address doesn't hold any Dustopia tokens yet.<br>
        <a href="/pfp" class="cta">Try the explorer →</a>
      </div>`;
  }

  // Initial skeleton while data loads.
  function renderSkeletons(n = 4) {
    const cards = Array.from({ length: n }).map(() =>
      `<div class="skeleton-card"></div>`
    ).join('');
    document.getElementById('tokens').innerHTML = `
      <div class="token-grid">${cards}</div>`;
  }

  // Card per token. Preview is the animated WebP served by the worker —
  // the renderer captures it on /embed visits, so there may be a brief
  // SVG-fallback look until at least one /embed has happened for the
  // current owner of each token.
  function renderTokens(tokenIds, ownerAddr) {
    if (!tokenIds.length) { renderEmpty(); return; }
    const cards = tokenIds.map((id) => `
      <a href="/embed/${encodeURIComponent(ownerAddr)}?token=${escHtml(id)}" class="token-card" title="Open token #${escHtml(id)}">
        <div class="token-img-wrap">
          <img src="${API_URL}/api/preview/${escHtml(id)}"
               alt="Dustopia #${escHtml(id)}"
               loading="lazy" decoding="async">
        </div>
        <div class="token-meta">
          <span class="token-name">Dustopia #${escHtml(id)}</span>
          <span class="token-id mono">#${escHtml(id)}</span>
        </div>
      </a>
    `).join('');
    document.getElementById('tokens').innerHTML = `
      <div class="token-grid">${cards}</div>`;
  }

  async function init() {
    const raw = parseHolderFromPath();
    const titleEl = document.getElementById('holderTitle');
    const addrEl  = document.getElementById('holderAddr');

    if (!raw) {
      titleEl.textContent = 'No address';
      renderError('Visit /holder/<address-or-ens> to see what a wallet has minted.');
      return;
    }

    titleEl.textContent = raw;
    addrEl.textContent  = '';
    renderSkeletons(4);

    let resolved;
    try {
      resolved = await resolve0x(raw);
    } catch (e) {
      titleEl.textContent = raw;
      renderError(`Couldn't resolve "${raw}". ${e.message}`);
      return;
    }

    // If the input was ENS, keep the ENS as the page title and show the
    // resolved 0x underneath. Pure addresses stay short-form on top.
    if (looksLikeEns(raw)) {
      titleEl.textContent = raw;
      addrEl.textContent  = resolved;
    } else {
      titleEl.textContent = shortAddr(resolved);
      addrEl.textContent  = resolved;
    }

    // Update <title> for shareability + bookmark hygiene.
    document.title = `${looksLikeEns(raw) ? raw : shortAddr(resolved)} · dustopia`;

    let tokenIds;
    try {
      const r = await fetch(`${API_URL}/api/owned/${resolved}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const j = await r.json();
      tokenIds = Array.isArray(j.tokenIds) ? j.tokenIds : [];
    } catch (e) {
      renderError(`Couldn't fetch owned tokens: ${e.message}`);
      return;
    }

    // Sort numerically so newer mints land at the bottom (deterministic).
    tokenIds.sort((a, b) => Number(a) - Number(b));

    const stats = document.getElementById('holderStats');
    stats.hidden = false;
    stats.innerHTML = `<span><b>${tokenIds.length}</b> Dustopia ${tokenIds.length === 1 ? 'token' : 'tokens'}</span>`;

    renderTokens(tokenIds, resolved);
  }

  init();
</script>

</body>
</html>
